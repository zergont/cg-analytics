# Матрица приоритетов неисправностей PCC3300
# Источник: operation_rules.json → alarm_priority_matrix; A035B516; 0900-0670
# Используется детектором CONTROLLER_FAULT для определения severity.
# Шкала: SHUTDOWN / ALARM / WARNING / INFO (ТЗ, раздел 8.3)
# Изменение: только через веб-морду (раздел 9 ТЗ)

# ─── МАППИНГ SEVERITY БИТОВ fault_bitmap_map → шкала ТЗ ────────────────────
# Каждый бит в fault_history имеет поле severity из fault_bitmap_map.jsonl.
# Переводим в шкалу INFO / WARNING / ALARM / SHUTDOWN.
bitmap_severity_map:
  shutdown: SHUTDOWN
  shutdown_cooldown: SHUTDOWN
  derate: ALARM
  warning: WARNING
  none: INFO

# ─── КОДЫ НЕИСПРАВНОСТЕЙ (регистры 40012/40013 — LAST_FAULT_CODE) ───────────
# Используется для детекции по коду последней неисправности.
# Дополняет bitmap-детекцию: одна и та же неисправность может идти через оба канала.

