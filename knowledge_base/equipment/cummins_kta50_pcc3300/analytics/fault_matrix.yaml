# Маппинг severity битов активных неисправностей PCC3300 → шкала ТЗ
# Источник: fault_bitmap_map.jsonl (severity битов); 0900-0670
# Используется детектором CONTROLLER_FAULT (bitmap-детекция, регистры 40400–40428).
# Шкала: SHUTDOWN / WARNING / CAUTION / INFO (ТЗ, раздел 8.3)
# Изменение: только через веб-морду (раздел 9 ТЗ)
#
# Канал кодов неисправностей (40012/40013) в детекции НЕ участвует:
# несброшенный код выводится в отчёт закрытия сегмента блоком
# «Несброшенная неисправность» с расшифровкой из справочника (fault_ref),
# а связка «CommonAlarm активен + 40012≠0 + других активных битов нет»
# даёт CAUTION (см. detectors.yaml → CONTROLLER_FAULT.common_alarm_*).

# ─── МАППИНГ SEVERITY БИТОВ fault_bitmap_map → шкала ТЗ ────────────────────
# Каждый бит в fault_history имеет поле severity из fault_bitmap_map.jsonl.
bitmap_severity_map:
  shutdown: SHUTDOWN
  shutdown_cooldown: SHUTDOWN
  derate: WARNING
  warning: WARNING
  none: INFO

# Severity по умолчанию для битов с нераспознанным severity
default_severity: WARNING
