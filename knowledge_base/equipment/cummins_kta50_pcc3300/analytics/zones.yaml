# Зоны нагрузки и гистерезис для KTA50/PCC3300
# Источник: ТЗ аналитики, раздел 5.2; A035B516, стр.63 (min 30%)
# Изменение: только через веб-морду (раздел 9 ТЗ)

# ─── ЗОНЫ НАГРУЗКИ ──────────────────────────────────────────────────────────
# Классификация LOAD_PCT (регистр 40014) по зонам нагрузки.
# Используется для сегментации (L2), риск-аккумуляторов и детекторов.

load_zones:
  LOW:
    min_pct: 0.0
    max_pct: 30.0
    label: "Малая нагрузка"
    description: >
      Работа ниже рекомендуемого минимума 30% (A035B516, стр.63).
      Риск закоксовки форсунок, разжижения масла топливом, wet stacking.
      Длительная работа в зоне — триггер COKING_RISK.
    _source: TUNABLE  # граница 30% — из A035B516 (PASSPORT_РЭ), остальное TUNABLE

  NORMAL:
    min_pct: 30.0
    max_pct: 70.0
    label: "Нормальная нагрузка"
    description: >
      Штатная зона работы. Паспорт PRIME: средняя нагрузка ≤70%.
      Оптимальный режим для ресурса двигателя.
    _source: TUNABLE

  ELEVATED:
    min_pct: 70.0
    max_pct: 100.0
    label: "Повышенная нагрузка"
    description: >
      Нагрузка выше 70% от номинала. Допустима непрерывно до 100%.
      Требует теплового контроля (THERMAL_HIGHLOAD).
      Охлаждение перед плановым остановом обязательно (COOLDOWN_VIOLATION).
    _source: TUNABLE

  OVERLOAD:
    min_pct: 100.0
    max_pct: ~          # без верхней границы
    label: "Перегрузка"
    description: >
      Нагрузка выше 100% номинала. Синхронизируется с кодом 1444 (Overload Warning).
      Требует немедленного внимания.
    _source: TUNABLE

  NA:
    label: "Нет данных"
    description: >
      Зона не определена (нет данных LOAD_PCT или RUN_STATE ≠ 3).
      Используется для сегментов в состоянии Stop/Warmup/Cooldown.
    _source: TUNABLE

# ─── ГИСТЕРЕЗИС ──────────────────────────────────────────────────────────────
# Асимметричный гистерезис: вход в зону — без порога, выход обратно — с порогом.
# Пример: вход в ELEVATED при ≥70%, выход (в NORMAL) только при <65%.
# Граница выхода = граница входа − hysteresis.pct

hysteresis:
  pct: 5.0
  description: >
    Гистерезис ±5% предотвращает дребезг на границах зон.
    Переход в новую зону засчитывается немедленно при пересечении границы входа.
    Возврат в предыдущую зону — только при пересечении (граница - hysteresis.pct).
  _source: TUNABLE
