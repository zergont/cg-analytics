  135:{what:"Сигнал датчика давления масла в магистрали вышел за верхний предел физического диапазона измерения (Out of Range High) — короткое замыкание сигнальной линии на плюс питания. Это НЕ признак реально высокого давления масла — это электрическая неисправность датчика или жгута.",causes:["Плохой контакт, окисление или повреждение пинов разъёма датчика давления масла","Внутренний отказ датчика давления масла (пробой)","Повреждение жгута двигателя — замыкание сигнальной жилы на питание +5 В","Повреждение жгута расширения (extension harness) до модуля AUX 105"],steps:["Отсоединить разъём от датчика давления масла. Осмотреть пины на окисление, изгиб, влагу и загрязнение.","Проверить напряжение питания датчика: подключить breakout-кабель, измерить напряжение между Supply и Return — норма 4.75–5.25 В.","Проверить сигнальное напряжение датчика: между Signal и Return — норма 0.46–4.56 В. Если выше — датчик или жгут неисправны.","Проверить жгут расширения до AUX 105 на КЗ между пинами: сопротивление между любыми парами пинов должно быть более 100 кОм.","Заменить датчик давления масла при подтверждении его неисправности."],related:"141, 143, 415",source:"0900-0670_I10_201204.pdf, раздел 10.8.3",verified:true},
  136:{what:"Сигнал датчика давления масла на входе в двигатель (Oil Inlet Pressure) превысил верхний порог нормального рабочего диапазона. Предупредительный сигнал — работа продолжается.",causes:["Заклинивание редукционного (перепускного) клапана масляного насоса в закрытом положении","Засорение масляного фильтра при холодном масле (слишком вязкое масло)","Неисправность или смещение калибровки датчика давления масла"],steps:["Проверить фактическое давление масла подключив механический манометр к штуцеру на корпусе масляного фильтра.","Подключить InPower и сравнить показания программного инструмента с механическим манометром.","Проверить состояние масляного фильтра, при необходимости заменить.","Проверить исправность и калибровку датчика давления масла."],related:"135, 142, 143",source:"0900-0670_I10_201204.pdf, Табл. 184",verified:true},
  137:{what:"Сигнальная цепь датчика уровня ОЖ замкнута на массу (низкий вольтаж при любых условиях).",causes:["Замыкание сигнального провода на корпус ДГУ в жгуте двигателя","Внутреннее короткое замыкание датчика уровня ОЖ","Повреждение изоляции в разъеме или на пинах датчика"],steps:["Отсоедините датчик и проверьте сопротивление цепи при отключенном питании","Проверьте жгут на отсутствие натирания и повреждения изоляции","Замените датчик, если в отключенном состоянии показывает замыкание"],related:"145, 196, 197",source:"A035B516_I6_202103.pdf",verified:true},
  141:{what:"Датчик давления масла зафиксировал падение ниже предупредительного порога (pp. 10-11). ДГУ продолжает работу, но есть риск заклинивания узлов трения.",causes:["Низкий уровень моторного масла из-за естественного расхода или микротечей","Засорение масляного фильтра или системы масляных каналов","Пониженная производительность масляного насоса (износ шестерен)"],steps:["Проверить уровень масла по щупу и долить при нехватке (норма — между min и max)","Заменить масляной фильтр","Если давление остается низким, проверить редукционный клапан насоса"],related:"143, 415, 1357",source:"A035B516_I6_202103.pdf, pp. 10-11",verified:true},
  142:{what:"Сигнал датчика давления масла вышел за границы допустимого рабочего диапазона (обрыв или КЗ линии).",causes:["Обрыв провода датчика в жгуте двигателя под клапанной крышкой","Замыкание сигнальной жилы на массу или на провод питания","Внутреннее разрушение терморезистивного элемента датчика"],steps:["Отсоедините разъем датчика давления масла и измерьте его сопротивление","Прозвоните жгут проводов от датчика до ECM на предмет обрыва","Заменить датчик при подозрении на внутренний дефект"],related:"141, 143",source:"A035B516_I6_202103.pdf",verified:true},
  143:{what:"Давление масла в масляном канале двигателя (oil rifle pressure) опустилось ниже порога предупреждения. Это <strong>предупреждение</strong>, не останов — двигатель продолжает работу, но ситуация требует внимания.",causes:["<strong>Реально низкое давление масла</strong> — недостаточный уровень масла, загрязнённый фильтр, износ масляного насоса или утечка","<strong>Неточность датчика давления масла</strong> — показания датчика занижены относительно реального давления","<strong>Активирована симуляция неисправности</strong> — в InPower включён режим fault simulation для датчика LOP","<strong>Порог срабатывания задан слишком высоко</strong> — уставка предупреждения завышена в настройках InPower"],steps:["<strong>Если установка питает критические нагрузки и не может быть остановлена</strong> — не останавливайте её принудительно. Дождитесь планового останова, затем выполните процедуру по коду 415.","<strong>Проверьте реальное давление масла</strong> механическим манометром: подключите к одному из штуцеров на верхней части корпуса масляного фильтра. Подключите InPower и сравните показания сервисного инструмента с механическим манометром.","<strong>Внимание:</strong> если есть сомнения в давлении масла — не запускайте двигатель, это может привести к его повреждению.","<strong>Проверьте, не активирована ли симуляция неисправности</strong> через InPower: убедитесь, что fault simulation для датчика LOP отключена.","<strong>Проверьте уставку порога</strong> через InPower: убедитесь, что порог предупреждения не выходит за пределы нормального рабочего диапазона давления масла для данного двигателя.","После устранения причины нажмите кнопку <strong>СБРОС</strong> на панели оператора."],related:"415",source:"0900-0670_I10_201204.pdf, раздел 10.8.5, стр. 388; A035B516.pdf, Табл. 13; PCC_3_3_Rus.pdf, Табл. 6, стр. 117",verified:true},
  144:{what:"Сигнал датчика температуры охлаждающей жидкости вышел за верхнюю границу допустимого диапазона (shorted high) — либо реальная температура поднялась до недопустимого уровня. Это <strong>предупреждение</strong>: двигатель начинает перегреваться. Если ситуацию не устранить, последует аварийный останов по коду 151.",causes:["<strong>Активирована симуляция неисправности</strong> через InPower","<strong>Неисправное соединение датчика температуры охлаждающей жидкости</strong> — окисление, обрыв, КЗ в разъёме или жгуте проводов","<strong>Неисправен датчик температуры охлаждающей жидкости</strong>","<strong>Неисправен жгут проводов двигателя или удлинительный жгут</strong>","<strong>Реальный перегрев</strong> — недостаточный уровень охлаждающей жидкости, загрязнение радиатора, слабый ремень вентилятора, высокая нагрузка или высокая окружающая температура"],steps:["<strong>Проверьте точность датчика:</strong> подключите независимый термозонд (термопару) вблизи датчика температуры охлаждающей жидкости, подключите InPower и сравните показания. Если значения близки — датчик исправен, причина в реальном перегреве.","<strong>Проверьте, не активирована ли симуляция:</strong> InPower → убедитесь, что fault simulation для датчика температуры охлаждающей жидкости отключена.","<strong>Проверьте уставки порогов:</strong> InPower → убедитесь, что порог предупреждения соответствует нормальному рабочему диапазону для данного датчика.","<strong>Если причина в реальном перегреве</strong> — выполните полный перечень проверок по коду 151 (перегрев двигателя).","После устранения причины нажмите кнопку <strong>СБРОС</strong>."],related:"151",source:"0900-0670_I10_201204.pdf, раздел 10.8.6, стр. 389; A035B516.pdf, Табл. 13; PCC_3_3_Rus.pdf, Табл. 6, стр. 117",verified:true},
  145:{what:"Температура охлаждающей жидкости двигателя опустилась ниже нижнего порога предупреждения. Это <strong>предупреждение</strong>: двигатель холодный. Для KTA50 критично, если установка должна принять нагрузку в течение 10 секунд — холодный двигатель может не успеть прогреться.",causes:["<strong>Не работает нагреватель охлаждающей жидкости</strong> (jacket water heater) — отсутствует питание, перегорел предохранитель, оборван кабель","<strong>Окружающая температура ниже 4°C</strong> — даже при работающем нагревателе жидкость может остывать быстрее, чем нагревается","<strong>Отсутствует циркуляция охлаждающей жидкости</strong>","<strong>Неисправен датчик температуры охлаждающей жидкости</strong> — занижает показания","<strong>Утечка охлаждающей жидкости</strong> — низкий уровень не даёт нагревателю поддерживать температуру"],steps:["<strong>Если установка питает критические нагрузки</strong> — не останавливайте её. Дождитесь планового останова, затем выполните процедуру по коду 1435.","<strong>Проверьте питание нагревателя охлаждающей жидкости:</strong> убедитесь, что нагреватель подключён к источнику питания и напряжение соответствует номинальному. Проверьте предохранитель и кабельные соединения.","<strong>Проверьте уровень охлаждающей жидкости</strong> в водяной рубашке и долейте при необходимости.","<strong>Проверьте наличие утечек</strong> охлаждающей жидкости; заделайте обнаруженные утечки.","<strong>Примечание:</strong> при окружающей температуре ниже 4°C предупреждение о низкой температуре может появляться даже при работающем нагревателе — это нормально.","После устранения причины нажмите кнопку <strong>СБРОС</strong>."],related:"1435",source:"A035B516.pdf, Табл. 13; PCC_3_3_Rus.pdf, Табл. 6, стр. 117 и стр. 66",verified:true},
  146:{what:"Температура охлаждающей жидкости превысила порог предупреждения для умеренно высокой температуры (moderately above normal). Это <strong>снижение номинала (Derate)</strong> — контроллер автоматически снижает мощность двигателя для защиты от перегрева. Двигатель продолжает работу, но на пониженной мощности. Если температура продолжит расти — последует аварийный останов по коду 151.",causes:["<strong>Неточный датчик температуры охлаждающей жидкости</strong> — показания завышены","<strong>Активирована симуляция неисправности</strong> через InPower","<strong>Неверная уставка порога</strong> — порог дерейтинга задан слишком низко","<strong>Реально высокая нагрузка</strong> — двигатель работает на пределе возможностей системы охлаждения","<strong>Высокая окружающая температура</strong> — снижает эффективность радиатора"],steps:["<strong>Проверьте точность датчика:</strong> подключите термозонд вблизи датчика и сравните показания через InPower.","<strong>Проверьте, не активирована ли симуляция:</strong> InPower → убедитесь, что fault simulation для датчика температуры охлаждающей жидкости отключена.","<strong>Проверьте уставку порога:</strong> InPower → убедитесь, что порог дерейтинга соответствует нормальному рабочему диапазону для данного двигателя.","<strong>Снизьте нагрузку</strong> на генераторную установку, если это возможно.","<strong>Проверьте систему охлаждения</strong> по полному перечню проверок кода 151: уровень жидкости, чистоту радиатора, ремень вентилятора.","После устранения причины нажмите кнопку <strong>СБРОС</strong>."],related:"151",source:"0900-0670_I10_201204.pdf, раздел 10.8.8, стр. 394; A035B516.pdf, Табл. 13; PCC_3_3_Rus.pdf, Табл. 6, стр. 117",verified:true},
  151:{what:"Температура охлаждающей жидкости поднялась выше порога аварийного останова (shutdown trip point), либо уровень охлаждающей жидкости критически низкий. Контроллер выполнил <strong>аварийный останов</strong> двигателя для предотвращения его повреждения. Перед любыми проверками необходимо дать двигателю <strong>полностью остыть</strong>.",causes:["<strong>Реальный перегрев двигателя:</strong> недостаточный уровень охлаждающей жидкости, утечки, засорение радиатора, неисправность ремня или вентилятора","<strong>Слишком высокая нагрузка</strong> при высокой окружающей температуре","<strong>Неточный датчик температуры</strong> — показания завышены","<strong>Активирована симуляция неисправности</strong> через InPower","<strong>Неверная уставка порога останова</strong> — задан слишком низко"],steps:["<strong>⚠ Дайте двигателю полностью остыть</strong> перед выполнением любых проверок.","<strong>Проверьте утечки охлаждающей жидкости:</strong> осмотрите патрубки, радиатор, прокладки; обнаруженные утечки устраните. Проверьте уровень охлаждающей жидкости в водяной рубашке и долейте, если уровень низкий.","<strong>Проверьте доступ охлаждающего воздуха:</strong> убедитесь, что нет препятствий для потока воздуха через радиатор (пыль, листья, посторонние предметы).","<strong>Проверьте ремень вентилятора:</strong> натяжение, целостность; при необходимости подтяните или замените.","<strong>Для удалённого радиатора:</strong> проверьте нагнетательный вентилятор и циркуляционные насосы.","<strong>Проверьте точность датчика температуры:</strong> подключите термозонд вблизи датчика, запустите двигатель и сравните показания через InPower.","<strong>Проверьте, не активирована ли симуляция:</strong> InPower → fault simulation для датчика температуры охлаждающей жидкости должна быть отключена.","<strong>Проверьте уставку порога останова</strong> через InPower; сравните с нормативными значениями для данного двигателя.","После устранения причины произведите <strong>сброс системы управления</strong> и запустите двигатель."],related:"144, 146, 155",source:"0900-0670_I10_201204.pdf, раздел 10.8.9, стр. 394; A035B516.pdf, Табл. 13; PCC_3_3_Rus.pdf, Табл. 6, стр. 117; K38-50_РЭ, стр. T-10",verified:true},

  196:{what:"Уровень охлаждающей жидкости в водяной рубашке двигателя упал ниже порога срабатывания датчика. Это <strong>предупреждение</strong>. Если уровень продолжит падать — возможен перегрев и аварийный останов.",causes:["<strong>Утечка охлаждающей жидкости</strong> — повреждение патрубков, прокладок, радиатора","<strong>Испарение/потеря охлаждающей жидкости</strong> при длительной эксплуатации без контроля уровня","<strong>Неисправен датчик уровня охлаждающей жидкости или его проводка</strong>"],steps:["<strong>Если генератор питает критические нагрузки</strong> — не останавливайте его немедленно, дождитесь планового останова.","<strong>⚠ Дайте двигателю полностью остыть</strong> перед открытием системы охлаждения.","<strong>Проверьте наличие утечек:</strong> осмотрите патрубки, радиатор, прокладки головки блока; устраните обнаруженные течи.","<strong>Проверьте и долейте уровень</strong> охлаждающей жидкости в водяной рубашке.","После устранения причины произведите <strong>сброс системы управления</strong> и запустите двигатель."],related:"151, 197",source:"A035B516.pdf, Табл. 13; PCC_3_3_Rus.pdf, Табл. 6, стр. 117",verified:true},
  197:{what:"Активирован вход «Низкий уровень охлаждающей жидкости» — порог настроен на <strong>предупреждение</strong>. Физически: датчик уровня охлаждающей жидкости на клемме J20-17 зафиксировал замыкание на землю, что означает падение уровня ниже точки срабатывания датчика.",causes:["<strong>Реально низкий уровень охлаждающей жидкости</strong> — утечки, испарение","<strong>Неисправен датчик уровня охлаждающей жидкости или проводка</strong>: замыкание в цепи датчика между J20-17 (Input) и J20-5 (Ground) активирует сигнал тревоги","<strong>Неверная настройка аннунциатора PCCNet</strong> — если используется, некорректная конфигурация TB1-6"],steps:["<strong>Если генератор питает критические нагрузки</strong> — дождитесь планового останова.","<strong>Проверьте датчик:</strong> отсоедините сигнальные провода датчика уровня от контроллера, нажмите СБРОС. Если код 197 исчезает и не появляется снова — замените датчик уровня охлаждающей жидкости.","<strong>Если код 197 появляется снова</strong> — проверьте наличие КЗ в проводке между датчиком и входом контроллера (J20-17: Input, J20-5: Ground). Замыкание сигнального провода на землю активирует сигнал.","<strong>Если используется аннунциатор PCCNet:</strong> проверьте проводку на TB1-6 до датчика уровня; убедитесь в отсутствии обрыва или КЗ. Проверьте конфигурацию входа (Active Open / Active Closed) в руководстве аннунциатора.","<strong>Проверьте уровень охлаждающей жидкости</strong> и долейте при необходимости.","После устранения причины произведите <strong>сброс системы управления</strong>."],related:"196, 151",source:"0900-0670_I10_201204.pdf, раздел 10.8.13, стр. 401; PCC_3_3_Rus.pdf, Табл. 6, стр. 118",verified:true},

  1433:{what:"Активирован <strong>местный аварийный останов</strong> (кнопка E-Stop на корпусе генераторной установки). Контроллер выполнил немедленный аварийный останов двигателя без цикла охлаждения. Сброс возможен <strong>только с местного пульта управления</strong>.",causes:["<strong>Нажата кнопка местного аварийного останова</strong> оператором","<strong>Случайное нажатие или механическое повреждение</strong> кнопки E-Stop","<strong>Неисправность в цепи кнопки E-Stop</strong>"],steps:["<strong>⚠ Дайте двигателю полностью остыть</strong> (горячий останов без охлаждения).","<strong>Определите и устраните причину</strong>, по которой был нажат аварийный останов.","<strong>Деактивируйте (разблокируйте) кнопку аварийного останова</strong> — поверните или вытяните по инструкции.","Нажмите кнопку <strong>СТОП</strong>.","Нажмите кнопку <strong>СБРОС</strong>.","Выберите требуемый рабочий режим (<strong>Ручной</strong> или <strong>Автоматический</strong>).","<strong>Убедитесь в исправности кнопки</strong> аварийного останова."],related:"1434",source:"PCC_3_3_Rus.pdf, Табл. 6, стр. 120",verified:true},

  1435:{what:"Температура охлаждающей жидкости в водяной рубашке двигателя опустилась ниже <strong>21°C (70°F)</strong>. Предупреждение указывает на то, что нагреватель охлаждающей жидкости не работает или жидкость не циркулирует. При такой температуре генераторная установка может не принять нагрузку в течение 10 секунд. <strong>Примечание:</strong> при окружающей температуре ниже 4°C предупреждение может появляться даже при исправном и работающем нагревателе.",causes:["<strong>Нагреватель охлаждающей жидкости не подключён к источнику питания</strong>","<strong>Перегорел предохранитель</strong> нагревателя","<strong>Обрыв или плохой контакт кабеля нагревателя</strong>","<strong>Утечка охлаждающей жидкости</strong> — низкий уровень не даёт нагревателю поддерживать температуру","<strong>Очень низкая окружающая температура</strong> (ниже 4°C) — нагреватель не справляется"],steps:["<strong>Проверьте питание нагревателя:</strong> убедитесь, что нагреватель охлаждающей жидкости подключён к источнику питания и напряжение соответствует номинальному.","<strong>Проверьте предохранитель</strong> нагревателя; при необходимости замените.","<strong>Проверьте кабельные соединения</strong> нагревателя; при необходимости исправьте.","<strong>Проверьте наличие утечек</strong> охлаждающей жидкости; заделайте обнаруженные утечки.","<strong>Проверьте уровень</strong> охлаждающей жидкости в водяной рубашке; при необходимости долейте.","После устранения причины нажмите кнопку <strong>СБРОС</strong>."],related:"145",source:"PCC_3_3_Rus.pdf, Табл. 6, стр. 120 и стр. 66",verified:true},
  1438:{what:"Двигатель не начал вращаться в ответ на команду пуска, либо стартер не обеспечил нормальную прокрутку. Контроллер зафиксировал <strong>отказ прокрутки</strong> и выполнил аварийный останов.",causes:["<strong>Активирована кнопка аварийного останова</strong>","<strong>Слабый или неисправный аккумулятор</strong> — не обеспечивает ток для стартера","<strong>Неисправность цепи измерения числа оборотов</strong>","<strong>Неисправность стартера или пусковой цепи</strong>","<strong>Механическое заклинивание двигателя</strong>"],steps:["<strong>⚠ Дайте двигателю полностью остыть</strong> перед проверками.","<strong>Убедитесь, что кнопка аварийного останова отжата (разблокирована).</strong>","Выполните проверки аккумулятора по процедуре кода <strong>441</strong>.","При наличии признаков механического заклинивания — <strong>вызовите инженера по обслуживанию Cummins</strong>."],related:"359, 441",source:"PCC_3_3_Rus.pdf, Табл. 6, стр. 120",verified:true},
  1439:{what:"Датчик низкого уровня топлива в <strong>расходном баке (day tank)</strong> зафиксировал недостаточный уровень топлива. Это <strong>предупреждение</strong>.",causes:["<strong>Уровень топлива в расходном баке ниже нормы</strong> — не поступает из основного бака","<strong>Утечка топлива</strong> из расходного бака или трубопроводов","<strong>Неисправен топливоперекачивающий насос</strong> расходного бака"],steps:["<strong>Проверьте наличие утечки топлива</strong>; заделайте течь по необходимости.","<strong>Проверьте уровень топлива</strong> в расходном баке; при необходимости долейте.","<strong>Проверьте работу топливоперекачивающего насоса</strong> — обеспечивает ли он подачу из основного бака.","После устранения причины нажмите кнопку <strong>СБРОС</strong>."],related:"1441",source:"PCC_3_3_Rus.pdf, Табл. 6, стр. 120",verified:true},
  1441:{what:"Уровень топлива в основном топливном баке опустился ниже порогового значения. Это <strong>предупреждение</strong>. При продолжении потребления без дозаправки двигатель остановится по коду 1918 (Fuel Level Low — Shutdown).",causes:["<strong>Низкий уровень топлива</strong> в баке","<strong>Утечка топлива</strong>"],steps:["<strong>Проверьте наличие утечки топлива</strong>; заделайте течь по необходимости.","<strong>Долейте топливо</strong> в бак.","После устранения причины нажмите кнопку <strong>СБРОС</strong>."],related:"1439, 1918",source:"PCC_3_3_Rus.pdf, Табл. 6, стр. 120",verified:true},
  1442:{what:"Во время прокрутки стартером напряжение аккумулятора упало до уровня сигнала «Внимание!» и оставалось на этом уровне в течение заданного времени. Это <strong>предупреждение</strong> о слабом аккумуляторе.",causes:["<strong>Аккумулятор потерял ёмкость</strong>","<strong>Недостаточная зарядка аккумулятора</strong>","<strong>Плохой контакт клемм</strong>"],steps:["Выполните проверки по коду <strong>441</strong> (Low Battery Voltage)."],related:"441, 1443",source:"PCC_3_3_Rus.pdf, Табл. 6, стр. 120",verified:true},
  1443:{what:"При прокрутке стартером напряжение аккумулятора упало ниже рабочего напряжения РСС — контроллер перезагрузился (reset). После <strong>трёх перезагрузок подряд</strong> активируется данный код и фиксируется <strong>аварийный останов</strong>.",causes:["<strong>Аккумулятор полностью разряжен</strong>","<strong>Аккумулятор неисправен</strong> — глубокий разряд, потеря ёмкости","<strong>Плохой контакт клемм</strong>"],steps:["Выполните проверки по коду <strong>441</strong> (Low Battery Voltage)."],related:"441, 1442",source:"PCC_3_3_Rus.pdf, Табл. 6, стр. 120",verified:true},
  1444:{what:"Активная мощность генераторной установки превысила порог перегрузки <strong>«Overload Threshold»</strong> на время, заданное параметром <strong>«Overload Set Time»</strong>. Это <strong>предупреждение</strong> — двигатель продолжает работу, но нагрузка превышает допустимую.",causes:["<strong>Реальная перегрузка</strong> — суммарная нагрузка превышает номинальную мощность генераторной установки","<strong>Параметр Overload Threshold задан слишком низко</strong> в InPower/Setup","<strong>КЗ в нагрузке или кабелях нагрузки</strong>","<strong>Неверный коэффициент ТТ (CT Ratio)</strong> — заниженный приводит к завышенным показаниям тока","<strong>Неверный коэффициент ТН (PT Ratio)</strong>"],steps:["<strong>Проверьте фактическую нагрузку:</strong> убедитесь, что суммарная нагрузка не превышает номинальную мощность ГУ.","<strong>Проверьте уставку Overload Threshold:</strong> Setup → Genset Setup → Overload Threshold. Убедитесь, что значение соответствует применению. <em>⚠ Не завышайте порог выше допустимого — это может повредить генератор.</em>","<strong>Проверьте нагрузку и кабели</strong> на наличие КЗ.","<strong>Проверьте правильность коэффициентов ТТ и ТН</strong> — см. коды 2814 и 2816.","После устранения причины нажмите кнопку <strong>СБРОС</strong>."],related:"1445, 1471, 1472",source:"0900-0670_I10_201204.pdf, раздел 10.8.62, стр. 442",verified:true},
  1445:{what:"Выходной ток генераторной установки превысил <strong>175% от номинального</strong>. Контроллер выполнил <strong>аварийный останов</strong>. <strong>⚠ Важно:</strong> этот код нельзя сбросить до истечения времени остывания альтернатора (Alternator Overheat Integral time) — до <strong>5 минут</strong>. Это защищает обмотки альтернатора от перегрева.",causes:["<strong>Короткое замыкание в нагрузке или кабелях нагрузки</strong>","<strong>Неисправные или неверно подключённые ТТ (CT)</strong>","<strong>Неверный коэффициент ТТ</strong> — занижен, что приводит к завышенному расчётному току"],steps:["<strong>⚠ Не пытайтесь сбросить неисправность до истечения 5 минут</strong> — альтернатор должен остыть.","<strong>Отключите нагрузку</strong> и проверьте кабели нагрузки на КЗ. Устраните обнаруженное КЗ.","<strong>Проверьте подключение ТТ:</strong> убедитесь в правильности подключения ТТ к базовой плате контроллера.","<strong>Проверьте коэффициент ТТ:</strong> InPower → Setup → убедитесь, что CT Ratio соответствует реальному. Используйте токовый зонд для проверки вторичного тока ТТ (пример: при CT Ratio 1000:5 ток на входе платы должен быть ≤5 А).","<strong>Если все предыдущие шаги в норме</strong> — замените базовую плату контроллера.","После истечения времени остывания нажмите кнопку <strong>СБРОС</strong>."],related:"1444, 1471, 1472",source:"0900-0670_I10_201204.pdf, раздел 10.8.63, стр. 443",verified:true},
  1446:{what:"Напряжение на одной или нескольких фазах генераторной установки превысило порог высокого напряжения AC. Контроллер выполнил <strong>аварийный останов</strong> для защиты нагрузки и оборудования.",causes:["<strong>Активирована симуляция неисправности</strong> через InPower","<strong>Неверно задан параметр High AC Voltage Trip</strong> — порог слишком низкий","<strong>Неверный режим срабатывания</strong> — Inverse Time vs Fixed Time (Inverse Time более чувствителен к выбросам напряжения)","<strong>Неверный коэффициент ТН (PT Ratio)</strong>","<strong>Неисправен AVR (автоматический регулятор напряжения)</strong>","<strong>Неисправен PMG (постоянный магнитный генератор возбуждения)</strong>","<strong>Смещение нагрузки регулятора (governor preload offset) задано слишком высоко</strong>"],steps:["<strong>Проверьте симуляцию неисправности:</strong> InPower → убедитесь, что fault simulation для High AC Voltage отключена. Если InPower недоступен: нажмите E-Stop, подождите 30 сек, отключите зарядное устройство, отключите АКБ (сначала «минус»), оставьте без питания 1 минуту, затем подключите обратно.","<strong>Проверьте параметр High AC Voltage Trip:</strong> InPower → Setup → убедитесь, что порог задан корректно. При режиме Inverse Time — более чувствителен к скачкам; для систем с большими двигателями рекомендуется Fixed Time.","<strong>Проверьте коэффициент ТН:</strong> см. код 2816.","<strong>Проверьте AVR и PMG</strong> — обратитесь к специалисту Cummins.","После устранения причины нажмите кнопку <strong>СБРОС</strong>."],related:"1447, 2816",source:"0900-0670_I10_201204.pdf, раздел 10.8.64, стр. 444",verified:true},
  1447:{what:"Напряжение на одной или нескольких фазах генераторной установки упало ниже порога низкого напряжения AC. Контроллер выполнил <strong>аварийный останов</strong>.",causes:["<strong>Кратковременная перегрузка</strong> при пуске большого электродвигателя","<strong>Реально низкое напряжение</strong> — неисправность системы возбуждения, AVR, PMG","<strong>Неверно задан параметр Low AC Voltage Trip</strong> — порог слишком высокий","<strong>Неверный коэффициент ТН (PT Ratio)</strong>","<strong>Активирована симуляция неисправности</strong>"],steps:["<strong>Проверьте симуляцию неисправности</strong> через InPower.","<strong>Проверьте параметр Low AC Voltage Trip</strong> через InPower — убедитесь, что порог задан корректно для данного применения.","<strong>Проверьте коэффициент ТН:</strong> см. код 2816.","<strong>Проверьте систему возбуждения (AVR, PMG)</strong> — обратитесь к специалисту Cummins.","После устранения причины нажмите кнопку <strong>СБРОС</strong>."],related:"1446, 2816",source:"0900-0670_I10_201204.pdf, раздел 10.8.65, стр. 446",verified:true},
  1448:{what:"Частота генераторной установки упала ниже <strong>90% от номинального значения</strong> (для 50 Гц — ниже 45 Гц) и оставалась на этом уровне около 10 секунд. Контроллер выполнил <strong>аварийный останов</strong>.",causes:["<strong>Перегрузка двигателя</strong> — нагрузка превышает возможности двигателя","<strong>Недостаточная подача топлива</strong> — засорён фильтр, низкое давление","<strong>Засорён воздушный фильтр</strong>","<strong>Неисправность регулятора частоты вращения</strong>"],steps:["<strong>⚠ Дайте двигателю полностью остыть.</strong>","<strong>Проверьте подачу топлива:</strong> наличие топлива, состояние фильтра, давление в топливной системе.","<strong>Проверьте подачу воздуха:</strong> состояние воздушного фильтра.","<strong>Проверьте нагрузку:</strong> убедитесь, что нагрузка не превышает номинальную мощность генераторной установки; скорректируйте при необходимости.","После устранения причины нажмите кнопку <strong>СБРОС</strong>."],related:"1449",source:"PCC_3_3_Rus.pdf, Табл. 6, стр. 120",verified:true},
  1449:{what:"Частота генераторной установки превысила порог повышенной частоты по временному параметру. Это <strong>предупреждение</strong>.",causes:["<strong>Сброс нагрузки</strong> — резкое снижение нагрузки вызывает рост частоты","<strong>Неисправность регулятора частоты вращения</strong>","<strong>Неверные настройки регулятора</strong>"],steps:["<strong>Проверьте подачу топлива.</strong>","<strong>Проверьте подачу воздуха.</strong>","<strong>Проверьте нагрузку</strong> — убедитесь в стабильности нагрузки.","После устранения причины нажмите кнопку <strong>СБРОС</strong>."],related:"1448",source:"PCC_3_3_Rus.pdf, Табл. 6, стр. 121",verified:true},
  1451:{what:"Через 5 секунд после замыкания автомата генератора контроллер непрерывно сравнивает напряжения ГУ и шины. Если разница превышает <strong>5%</strong> — активируется данное предупреждение. Это <strong>предупреждение</strong> о несоответствии калибровки измерительных цепей.",causes:["<strong>Неверная калибровка напряжения ГУ или шины</strong>","<strong>Неверный коэффициент ТН (PT Ratio)</strong> для ГУ или шины","<strong>Ошибка измерительных цепей</strong>"],steps:["<strong>Откалибруйте напряжения ГУ и шины</strong> по всем фазам для улучшения точности измерений. Обратитесь к разделу «Калибровка» руководства.","<strong>Если напряжение выше 600 В:</strong> проверьте правильность коэффициентов ТН. Для ТН сети: Setup → Paralleling Setup → Power Transfer Control → PT Primary / PT Secondary. Для ТН ГУ: Setup → OEM Setup → OEM Alt Setup → PT Primary / PT Secondary.","После устранения причины нажмите кнопку <strong>СБРОС</strong>."],related:"2816, 2817",source:"0900-0670_I10_201204.pdf, раздел 10.8.68, стр. 450",verified:true},
  1452:{what:"Автомат генераторной установки не замкнулся в течение времени, заданного параметром <strong>«Gen CB Fail to Close Time Delay»</strong>. Контроллер отправил команду на замыкание, но статус положения автомата остался «разомкнут». Это <strong>предупреждение</strong>.",causes:["<strong>Неверная схема управления замыканием автомата</strong> — нет сигнала от TB5-1/TB5-2 до катушки автомата","<strong>Неверная схема контроля положения автомата</strong>","<strong>Неисправен автомат генераторной установки</strong>"],steps:["<strong>Проверьте схему управления замыканием:</strong> выход управления замыканием Genset CB — реле NO на TB5-1 и TB5-2 (Relay Common). При замкнутом реле контроллера автомат должен замкнуться. Проверьте проводку от TB5-1/TB5-2 до автомата на обрыв.","<strong>Проверьте схему контроля положения:</strong> Setup → Paralleling Setup → Basic → Pos Contacts → Genset Breaker Position Contacts. При одиночном контроле: CB A (NO) на TB10-7, Return на TB10-2. При двойном: добавить CB B (NC) на TB10-8, TB10-2. Контакты A и B должны быть противоположны.","<strong>Убедитесь, что статус положения в меню</strong> совпадает с физическим состоянием автомата: Paralleling Status → Genset CB Position Status.","<strong>Если проводка в норме</strong> — обратитесь к документации на автомат генераторной установки.","После устранения причины нажмите кнопку <strong>СБРОС</strong>."],related:"1453, 1454, 1328",source:"0900-0670_I10_201204.pdf, раздел 10.8.69, стр. 451",verified:true},
  1453:{what:"Автомат генераторной установки не разомкнулся в течение времени, заданного параметром <strong>«Gen CB Fail to Open Time Delay»</strong>. Контроллер отправил команду на размыкание, но статус положения автомата остался «замкнут». Это <strong>предупреждение</strong>.",causes:["<strong>Неверная схема управления размыканием автомата</strong> — нет сигнала от TB5-5/TB5-4 до катушки автомата","<strong>Неверная схема контроля положения автомата</strong>","<strong>Неисправен автомат генераторной установки</strong>"],steps:["<strong>Проверьте схему управления размыканием:</strong> выход управления размыканием Genset CB — реле NC на TB5-5 и TB5-4 (Relay Common). При замкнутом реле контроллера автомат замкнут. Проверьте проводку от TB5-4/TB5-5 до автомата на КЗ.","<strong>Проверьте схему контроля положения</strong> аналогично коду 1452: TB10-7, TB10-2 (одиночный) или + TB10-8 (двойной). Статус в меню должен совпадать с физическим состоянием.","<strong>Если проводка в норме</strong> — обратитесь к документации на автомат генераторной установки.","После устранения причины нажмите кнопку <strong>СБРОС</strong>."],related:"1452, 1454, 1328",source:"0900-0670_I10_201204.pdf, раздел 10.8.70, стр. 452",verified:true},
  1454:{what:"Несоответствие в статусе положения автомата генераторной установки — контроллер получает противоречивые сигналы о состоянии автомата (замкнут/разомкнут). Это <strong>предупреждение</strong>.",causes:["<strong>Несоответствие схемы контроля положения автомата</strong> — конфликт между токовым контролем и сигналом положения CB A","<strong>Неверное подключение контактов положения</strong> CB A (NO) или CB B (NC)","<strong>Неисправен автомат генераторной установки</strong>"],steps:["<strong>Проверьте схему контроля положения:</strong> Setup → Paralleling Setup → Basic → Pos Contacts → Genset Breaker Position Contacts.","<strong>При одиночном контроле:</strong> TB10-7 (CB A, NO) и TB10-2 (Return). Убедитесь в отсутствии обрыва или КЗ.","<strong>При двойном контроле:</strong> дополнительно TB10-8 (CB B, NC) и TB10-2 (Return). Контакты A (NO) и B (NC) должны быть <em>всегда противоположны</em> — если одинаковы, проверьте проводку между автоматом и платой.","<strong>Проверьте соответствие</strong> физического состояния автомата статусу в меню: Paralleling Status → Iso Bus Sc 1 → Genset CB Pos → Genset CB Position Status.","После устранения причины нажмите кнопку <strong>СБРОС</strong>."],related:"1452, 1453",source:"0900-0670_I10_201204.pdf, раздел 10.8.71, стр. 453",verified:true},
  1455:{what:"Несоответствие в статусе положения автомата ввода сети (Utility CB) — контроллер получает противоречивые сигналы о состоянии автомата. Это <strong>предупреждение</strong>. Также активируется, если не активирован входной сигнал <code>Utility Single Mode Verify Switch</code>.",causes:["<strong>Не активирован Utility Single Mode Verify Switch</strong> — при настройке Utility Single/Multiple или PTC: без этого сигнала контроллер не замкнёт автомат сети","<strong>Несоответствие схемы контроля положения автомата сети</strong>","<strong>Неисправен автомат ввода сети</strong>"],steps:["<strong>Если не активирован Utility Single Mode Verify Switch:</strong> подайте сигнал замыкания между TB10-12 (Single Mode Verify Input) и TB10-16 (Return), затем нажмите кнопку сброса неисправности на дисплее.","<strong>Проверьте схему контроля положения автомата сети:</strong> Setup → Paralleling Setup → Basic → Pos Contacts → Utility Breaker Position Contacts.","<strong>При одиночном контроле:</strong> TB10-3 (CB A, NO) и TB10-1 (Return). Убедитесь в отсутствии обрыва или КЗ.","<strong>При двойном контроле:</strong> дополнительно TB10-4 (CB B, NC) и TB10-1 (Return). Контакты A и B должны быть противоположны. Проверьте соответствие: Paralleling Status → PTC Sc 1 → Util CB Pos → Utility CB Position Status.","<strong>Если проводка в норме</strong> — обратитесь к документации на автомат ввода сети.","После устранения причины нажмите кнопку <strong>СБРОС</strong>."],related:"1452, 1453, 1454",source:"0900-0670_I10_201204.pdf, раздел 10.8.72, стр. 453",verified:true},
  1456:{what:"Синхронизатор не может быть включён, так как напряжение и/или частота на шине системы находятся за пределами диапазона <strong>60–110% от номинала</strong>. Это <strong>предупреждение</strong> о невозможности синхронизации.",causes:["<strong>Потеря фазы на шине</strong> — сработал предохранитель или обрыв в кабелях напряжения шины до параллельного автомата","<strong>Неверная схема измерения напряжения шины</strong> на базовой плате: L1 — TB7-1, L2 — TB7-2, L3 — TB7-3","<strong>Неверный коэффициент или неисправность ТН шины</strong> (при напряжении >600 В)"],steps:["<strong>⚠ Внимание: высокое напряжение!</strong> Работы должны выполняться только квалифицированным персоналом.","<strong>Проверьте наличие всех трёх фаз на шине:</strong> используйте измеритель порядка фаз или синхроскоп для проверки чередования фаз шины у параллельного автомата. При отсутствии фазы проверьте предохранители и кабели напряжения шины.","<strong>Проверьте схему измерения напряжения шины на базовой плате:</strong> при ≤600 В — измерьте напряжение и чередование фаз на TB7-1 (L1), TB7-2 (L2), TB7-3 (L3). Напряжение должно соответствовать номиналу, чередование — L1–L2–L3.","<strong>При напряжении >600 В:</strong> проверьте схему ТН шины и измерьте соотношение вход/выход ТН (пример: 4160/120 В). При несоответствии замените ТН.","После устранения причины нажмите кнопку <strong>СБРОС</strong>."],related:"1457, 1458",source:"0900-0670_I10_201204.pdf, раздел 10.8.73, стр. 454",verified:true},
  1457:{what:"Синхронизатор не достиг условий синхронизации в течение времени, заданного параметром <strong>«Fail To Synchronize Time»</strong>. Контроллер не замкнул параллельный автомат. Это <strong>предупреждение</strong>.",causes:["<strong>Неверная калибровка напряжения или частоты ГУ или шины</strong>","<strong>Неисправен ТН (PT)</strong>","<strong>Слишком жёсткие параметры разрешительного окна (Permissive Window)</strong> — разница в напряжении, частоте или угле фазы между ГУ и шиной не вписывается в заданные окна"],steps:["<strong>Проверьте калибровку ГУ:</strong> измерьте частоту и напряжение на выходе генератора откалиброванным прибором и сравните с показаниями на дисплее контроллера.","<strong>Проверьте калибровку шины:</strong> Setup → Calibration → L12/L23/L31 Adjust → Genset Bus Voltage Calibration; Setup → Adjust → Frequency Calibration. Откорректируйте при необходимости.","<strong>Проверьте ТН:</strong> измерьте вход и выход ТН вольтметром (соотношение должно быть пропорциональным, пример: 4160/120 В). При несоответствии замените ТН.","<strong>Проверьте и расширьте параметры разрешительного окна:</strong> Setup → Paralleling Setup → Basic → Permissive Parameters: Permissive Frequency Window, Permissive Voltage Window, Permissive Phase Window, Permissive Window Time.","<strong>Увеличьте «Fail To Synchronize Time»</strong> при необходимости: Setup → Paralleling Setup → Basic → Sync Time.","После устранения причины нажмите кнопку <strong>СБРОС</strong>."],related:"1456, 1458",source:"0900-0670_I10_201204.pdf, раздел 10.8.74, стр. 455",verified:true},
  1458:{what:"Несоответствие чередования фаз между выходом генераторной установки и системной шиной. Синхронизация невозможна. Это <strong>предупреждение</strong>.",causes:["<strong>Неверная схема подключения кабелей напряжения ГУ или шины к параллельному автомату</strong>","<strong>Неверная схема измерения напряжения ГУ или шины на базовой плате</strong>"],steps:["<strong>⚠ Внимание: высокое напряжение!</strong> Работы должны выполняться только квалифицированным персоналом.","<strong>Проверьте чередование фаз</strong> шины и ГУ измерителем порядка фаз. Запустите ГУ в режиме Ручной без замыкания параллельного автомата. Чередование фаз ГУ и шины должно совпадать — L1–L2–L3.","<strong>При несоответствии</strong> поменяйте местами два фазных кабеля в нужной точке (на стороне ГУ или шины) для получения правильного чередования.","После устранения причины нажмите кнопку <strong>СБРОС</strong>."],related:"1456, 1457",source:"0900-0670_I10_201204.pdf, раздел 10.8.75, стр. 457",verified:true},
  1459:{what:"Генераторная установка потребляет активную мощность из шины (работает как двигатель вместо генератора). Контроллер выполнил <strong>аварийный останов</strong>. Физически: ток генератора изменил направление — ГУ стала нагрузкой для сети или другого генератора.",causes:["<strong>Резкий сброс нагрузки</strong> при параллельной работе","<strong>Неисправность системы управления топливоподачей</strong>","<strong>Неверная настройка распределения нагрузки (kW load sharing)</strong>","<strong>Неправильное подключение линий распределения нагрузки kW</strong>: TB9-7 (−), TB9-8 (+), TB9-9 (экран)"],steps:["<strong>⚠ Дайте двигателю полностью остыть.</strong>","<strong>Проверьте подключение линий kW load share:</strong> Negative — TB9-7, Positive — TB9-8, Shield — TB9-9. Экран заземляется только с одной стороны. Проверьте целостность проводников (сопротивление <10 Ом).","<strong>Проверьте настройки распределения нагрузки</strong> через InPower.","<strong>Проверьте систему управления топливоподачей.</strong>","После устранения причины нажмите кнопку <strong>СБРОС</strong>."],related:"1461",source:"0900-0670_I10_201204.pdf, раздел 10.8.76",verified:true},
  1461:{what:"Реактивная мощность (кВАр) изменила направление — генераторная установка потребляет реактивную мощность из шины (Reverse kVAR). Физически: напряжение ГУ ниже напряжения шины, из-за чего ГУ импортирует реактивный ток. Контроллер выполнил <strong>аварийный останов</strong>.",causes:["<strong>Напряжение ГУ ниже напряжения шины</strong> — неверная калибровка напряжения","<strong>Неверное подключение линий kVAR load share</strong>: TB9-10 (KVAR+), TB9-11 (KVAR−)","<strong>Неверно настроен Leading Power Factor</strong>","<strong>Неверный коэффициент ТН</strong>"],steps:["<strong>Проверьте калибровку напряжения:</strong> измерьте напряжение на шине и напряжение на выходе ГУ вольтметром. Напряжение ГУ должно быть на +3 В/−0 В выше напряжения шины. Для коррекции: Setup → Adjust → Voltage Calibration → увеличьте выходное напряжение ГУ.","<strong>Проверьте подключение линий kVAR load share:</strong> TB9-8 (KW+), TB9-7 (KW−), TB9-10 (KVAR+), TB9-11 (KVAR−), TB9-9 (Shield — заземлить только с одной стороны). Проверьте на обрыв и КЗ.","<strong>Проверьте настройку Leading Power Factor</strong> через InPower.","После устранения причины нажмите кнопку <strong>СБРОС</strong>."],related:"1459",source:"0900-0670_I10_201204.pdf, раздел 10.8.77, стр. 459",verified:true},
  1463:{what:"Информационное событие. Переключатель режимов работы ДГУ переведен из положения AUTO в положение MANUAL или STOP. Установка не сможет запуститься автоматически по сигналу АВР.",causes:["Действия обслуживающего персонала (ручной перевод панели в другой режим для проведения ТО или прогрева)","Неисправность кнопочной панели или дребезг контактов поворотного переключателя режимов"],steps:["Код является статусным сообщением. Если требуется автоматическая готовность объекта, вернуть панель в режим AUTO.","Проверить, пропал ли статус Not In Auto с главного экрана."],related:"1132, 1244",source:"external/google-ai",verified:false},
  1464:{what:"Контроллер активировал функцию <strong>Load Dump</strong> — снижение нагрузки для предотвращения останова ГУ. Это <strong>предупреждение</strong>, которое активируется автоматически при перегрузке или снижении частоты ниже допустимого порога.",causes:["<strong>Другая активная неисправность типа Derate</strong> — 1464 является следствием другой ошибки со статусом «Derate»","<strong>Параметр Overload Threshold задан слишком низко</strong>","<strong>Параметр Under-frequency Offset задан слишком низко</strong>","<strong>Параметры Overload Set Time или Under-frequency Set Time заданы слишком низко</strong>","<strong>Неверный коэффициент ТТ</strong>"],steps:["<strong>Проверьте другие активные неисправности типа Derate</strong> — устраните их в первую очередь.","<strong>Проверьте Overload Threshold:</strong> Setup → Genset Setup → Overload Threshold.","<strong>Проверьте Under-frequency Offset:</strong> Setup → Genset Setup → Under-frequency Offset.","<strong>Проверьте Overload Set Time и Under-frequency Set Time:</strong> Setup → Genset Setup.","<strong>Проверьте коэффициент ТТ</strong> — см. коды 2814, 2815.","После устранения причины нажмите кнопку <strong>СБРОС</strong>."],related:"1444, 1448",source:"0900-0670_I10_201204.pdf, раздел 10.8.78, стр. 460",verified:true},
  1465:{what:"Информационное событие. Двигатель успешно запущен, обороты и выходное напряжение достигли номинальных значений. Панель готова подать команду на замыкание силового выключателя.",causes:["Штатный выход генераторной установки на рабочий режим после пуска"],steps:["Ремонтные действия не требуются. Сообщение информирует о полной оперативной готовности ДГУ принять нагрузку."],related:"1122, 1336",source:"external/google-ai",verified:false},
  1469:{what:"Частота вращения двигателя и частота выходного напряжения генератора не совпадают. Для KTA50 при 50 Гц нормальная скорость — <strong>1500 об/мин</strong>. Контроллер выполнил <strong>аварийный останов</strong>.",causes:["<strong>Неверно задано количество зубьев маховика</strong> (Flywheel Teeth) — для гидромеханических ГУ","<strong>Неисправен магнитный датчик частоты вращения (MPU)</strong> — для гидромеханических ГУ","<strong>Неверные данные частоты вращения от ECM</strong> по CAN-шине","<strong>Установлен новый генератор с другим числом полюсов</strong>","<strong>Искажения от нелинейной нагрузки</strong> — ИБП, определённые типы освещения могут вызывать расхождение измеренной частоты","<strong>Порог или время задержки Speed/Hz Mismatch заданы слишком низко</strong>","<strong>Неверный параметр Frequency-to-Speed Gain Select</strong>"],steps:["<strong>⚠ Дайте двигателю остыть.</strong>","<strong>Для KTA50 с ECM:</strong> проверьте данные частоты вращения от ECM через CAN. На дисплее: Engine Data → Engine Speed. Нормальное значение при 50 Гц — 1500 об/мин.","<strong>Если установлен новый генератор:</strong> пересчитайте коэффициент Frequency-to-Speed = 120 / число полюсов генератора. Задайте: Setup → OEM Setup → OEM Engine Setup → Freq/Speed → Frequency to Speed Gain Select.","<strong>Проверьте порог и время задержки:</strong> InPower → Speed/Frequency Mismatch Threshold (диапазон 0,1–20 Гц) и Speed/Frequency Mismatch Time (0,2–10 сек).","<strong>При нелинейной нагрузке</strong> — проверьте тип нагрузки (ИБП, освещение). Обратитесь к документации T-030 по применению.","После устранения причины нажмите кнопку <strong>СБРОС</strong>."],related:"234, 236",source:"0900-0670_I10_201204.pdf, раздел 10.8.79, стр. 461",verified:true},
  1471:{what:"Ток генераторной установки превысил порог защиты от перегрузки по току. Это <strong>предупреждение</strong> — двигатель продолжает работу, но ситуация требует внимания.",causes:["<strong>Реальная перегрузка по току</strong> — суммарная нагрузка превышает допустимый ток ГУ","<strong>Неверный коэффициент ТТ</strong>","<strong>КЗ в нагрузке или кабелях</strong>"],steps:["<strong>Проверьте фактическую нагрузку</strong> — убедитесь, что ток не превышает номинальный.","<strong>Проверьте коэффициент ТТ</strong> — см. код 2814.","<strong>Проверьте нагрузку и кабели</strong> на наличие КЗ.","После устранения причины нажмите кнопку <strong>СБРОС</strong>."],related:"1472, 1444, 1445",source:"0900-0670_I10_201204.pdf, раздел 10.8.80, стр. 463",verified:true},

  1689:{what:"Питание микросхемы часов реального времени (RTC) на базовой плате было прервано, и часы больше не показывают правильное время. RTC имеет внутренний конденсатор, который поддерживает её работу до <strong>1 часа</strong> при отключении АКБ. При отключении более 1 часа — часы сбрасываются. Это <strong>предупреждение</strong>.",causes:["<strong>АКБ была отключена более чем на 1 час</strong>","<strong>АКБ разряжена</strong> настолько, что питание RTC прервалось"],steps:["<strong>Подтвердите неисправность</strong> — нажмите кнопку СБРОС. Если код 1689 исчезает и не появляется снова — контроллер исправен, просто требуется установка времени.","<strong>Установите дату и время:</strong> Setup → Clock Setup → установите корректное время и дату.","<strong>Проверьте состояние АКБ</strong> — убедитесь, что зарядное устройство работает и напряжение АКБ в норме.","После устранения нажмите кнопку <strong>СБРОС</strong>."],related:"441",source:"0900-0670_I10_201204.pdf, раздел 10.8.87, стр. 466",verified:true},

  1852:{what:"Содержание воды в топливе превысило порог предварительного предупреждения. Это <strong>предупреждение</strong> о необходимости слива воды из топлива до того, как будет достигнут критический уровень (код 418).",causes:["<strong>Конденсат воды в топливном баке</strong> — при перепадах температур","<strong>Загрязнённое топливо</strong> при заправке"],steps:["<strong>Проверьте количество топлива</strong> в баке (местном или выносном).","<strong>Слейте воду из отстойника</strong> топливного фильтра; при необходимости слейте и замените топливо в баке.","<strong>При сливе топлива соблюдайте</strong> правила охраны труда, техники безопасности и защиты окружающей среды.","После устранения причины нажмите кнопку <strong>СБРОС</strong>."],related:"418",source:"PCC_3_3_Rus.pdf, Табл. 6, стр. 121",verified:true},
  1853:{what:"Срабатывание входа №1 (<strong>Customer Input 1, LED 1</strong>) аннунциатора HMI 113 (Universal Annunciator). Это <strong>предупреждение</strong>. Физически: сигнал заземления (ground) на клемму <strong>TB1-1</strong> на тыльной стороне аннунциатора при настройке по умолчанию.",causes:["<strong>Реальное срабатывание условия</strong>, для которого настроен вход — например, низкий уровень топлива, высокая температура и т.д.","<strong>Неверная конфигурация аннунциатора:</strong> параметр активации (Negative/Positive input) или инверсия сигнала задан неверно","<strong>Неверная схема подключения</strong> — обрыв или КЗ на TB1-1","<strong>Неисправен аннунциатор</strong>"],steps:["<strong>Проверьте условие, для которого настроен вход 1:</strong> если настроен на низкий уровень топлива — проверьте уровень; после устранения причины нажмите СБРОС.","<strong>Проверьте конфигурацию аннунциатора:</strong> по умолчанию вход 1 активируется сигналом земли на TB1-1 (Negative input, Not Inverted). Убедитесь в правильности настроек согласно руководству на аннунциатор (P/N 0900-0301).","<strong>Проверьте проводку на TB1-1:</strong> убедитесь в отсутствии КЗ или обрыва в соответствии с конфигурацией аннунциатора.","<strong>Проверьте датчик, реле или устройство</strong>, подключённое к входу 1 аннунциатора; при необходимости замените.","<strong>Если проводка и конфигурация в норме</strong> — замените аннунциатор."],related:"1854, 1855",source:"0900-0670_I10_201204.pdf, раздел 10.8.89, стр. 467",verified:true},
  1854:{what:"Срабатывание входа №2 (<strong>Customer Input 2, LED 2</strong>) аннунциатора HMI 113. Это <strong>предупреждение</strong>. По умолчанию активируется сигналом земли на клемму <strong>TB1-2</strong>.",causes:["<strong>Реальное срабатывание условия</strong>, для которого настроен вход 2","<strong>Неверная конфигурация или схема подключения</strong> — КЗ или обрыв на TB1-2","<strong>Неисправен аннунциатор</strong>"],steps:["<strong>Проверьте условие</strong>, для которого настроен вход 2; устраните причину; нажмите СБРОС.","<strong>Проверьте конфигурацию аннунциатора</strong> и проводку на TB1-2.","<strong>Проверьте датчик или устройство</strong> на входе 2.","<strong>Если проводка и конфигурация в норме</strong> — замените аннунциатор."],related:"1853, 1855",source:"0900-0670_I10_201204.pdf, раздел 10.8.90, стр. 468",verified:true},

  1899:{what:"Датчик зафиксировал недостаточный перепад давления в трубке Вентури контура рециркуляции. Поток выхлопных газов через систему EGR ниже расчётного.",causes:["Засорение измерительных металлических трубок от выхлопного коллектора к датчику перепада давления твёрдой сажей","Клапан EGR заклинен в закрытом положении и не пропускает газы"],steps:["Демонтировать и тщательно прочистить (продуть сжатым воздухом) импульсные трубки датчика перепада давления EGR.","Проверить исправность клапана EGR (смотри код 1896)."],related:"1896, 621",source:"external/google-ai",verified:false},
  1911:{what:"Алгоритм мониторинга зафиксировал избыточное давление дизельного топлива в контуре актуаторов дозирования форсунок. Предупреждение о риске гидроудара.",causes:["Подклинивание или механический износ запорного элемента актуатора дозирования топлива","Критическое сужение пропускной способности или залом трубки обратного слива топлива в бак","Смещение калибровочной кривой датчика давления топлива в рампе"],steps:["Проверить всю линию обратного трубопровода (обратку) от двигателя до бака на отсутствие закрытых кранов или пережатых шлангов.","Сверить показания штатного датчика давления с данными физического механического манометра.","Проверить сопротивление обмотки и плавность хода иглы актуатора дозирования топлива."],related:"449, 451",source:"external/google-ai",verified:false},
  1912:{what:"В режиме PTC (Power Transfer Control): угол сдвига фаз между фазами питающей сети вышел за пределы диапазона <strong>90–150 градусов</strong> (норма 120°) в течение времени <code>Utility Loss of Phase Drop-Out Delay</code>. Это <strong>предупреждение</strong> о потере или нестабильности фазы в питающей сети.",causes:["<strong>Обрыв в одной из цепей измерения напряжения питающей сети</strong> — потеря фазы на TB7-1 (L1), TB7-2 (L2) или TB7-3 (L3)","<strong>Нестабильность напряжения или частоты питающей сети</strong>"],steps:["<strong>Проверьте цепи измерения напряжения сети:</strong> L1 — TB7-1, L2 — TB7-2, L3 — TB7-3. Угол между всеми фазами должен быть 120°. Убедитесь в отсутствии обрыва; при использовании ТН — проверьте входы и выходы ТН.","<strong>При нестабильности напряжения сети</strong> — обратитесь к поставщику электроэнергии.","После устранения причины нажмите кнопку <strong>СБРОС</strong>."],related:"1913, 1914",source:"0900-0670_I10_201204.pdf, раздел 10.8.92, стр. 470",verified:true},
  1913:{what:"В режиме PTC: угол сдвига фаз между фазами генераторной установки вышел за пределы диапазона <strong>90–150 градусов</strong> в течение времени <code>Genset Loss of Phase Drop-Out Delay</code>. Это <strong>предупреждение</strong> о потере фазы или нестабильной работе генератора.",causes:["<strong>Активная неисправность генераторной установки</strong>, вызывающая рысканье/колебания частоты","<strong>Обрыв в одной из цепей измерения напряжения ГУ</strong> — потеря фазы на J22-1 (L1), J22-2 (L2) или J22-3 (L3)"],steps:["<strong>Проверьте и устраните все активные неисправности ГУ</strong> на дисплее, особенно те, которые могут вызывать нестабильность частоты/напряжения.","<strong>Проверьте цепи измерения напряжения ГУ:</strong> L1 — J22-1, L2 — J22-2, L3 — J22-3. Угол между всеми фазами должен быть 120°. При использовании ТН — проверьте входы и выходы ТН.","После устранения причины нажмите кнопку <strong>СБРОС</strong>."],related:"1912, 1915",source:"0900-0670_I10_201204.pdf, раздел 10.8.93, стр. 471",verified:true},
  1914:{what:"Чередование фаз питающей сети не соответствует ожидаемому (L1–L2–L3). Это <strong>предупреждение</strong>.",causes:["<strong>Неверная схема подключения кабелей измерения напряжения сети</strong> к базовой плате: TB7-1 (L1), TB7-2 (L2), TB7-3 (L3)","<strong>Неверная схема от платы до ТН или от ТН до сети</strong> (при напряжении >600 В)"],steps:["<strong>⚠ Внимание: высокое напряжение!</strong>","<strong>При напряжении ≤600 В:</strong> измерьте чередование фаз и напряжение на TB7-1 (L1), TB7-2 (L2), TB7-3 (L3). Чередование должно быть L1–L2–L3. При несоответствии — исправьте проводку.","<strong>При напряжении >600 В:</strong> измерьте чередование на выходе ТН (TB7-1/2/3). При несоответствии — проверьте схему от платы до ТН и от ТН до шины сети.","После устранения причины нажмите кнопку <strong>СБРОС</strong>."],related:"1912, 1458",source:"0900-0670_I10_201204.pdf, раздел 10.8.94, стр. 471",verified:true},
  1915:{what:"Чередование фаз генераторной установки не соответствует ожидаемому (L1–L2–L3). Это <strong>предупреждение</strong>.",causes:["<strong>Неверная схема подключения кабелей измерения напряжения ГУ</strong> к базовой плате: J22-1 (L1), J22-2 (L2), J22-3 (L3)","<strong>Неверная схема от платы до ТН или от ТН до ГУ</strong> (при напряжении >600 В)"],steps:["<strong>⚠ Внимание: высокое напряжение!</strong>","<strong>При напряжении ≤600 В:</strong> измерьте чередование фаз и напряжение на J22-1 (L1), J22-2 (L2), J22-3 (L3). Чередование должно быть L1–L2–L3. При несоответствии — исправьте проводку.","<strong>При напряжении >600 В:</strong> измерьте чередование на выходе ТН (J22-1/2/3). При несоответствии — проверьте схему от платы до ТН и от ТН до ГУ.","После устранения причины нажмите кнопку <strong>СБРОС</strong>."],related:"1913, 1458",source:"0900-0670_I10_201204.pdf, раздел 10.8.95, стр. 472",verified:true},
  1916:{what:"Информационное событие. Встроенный блок контроля синхронизма (Sync Check) панели PCC подтвердил, что параметры генератора (фаза, частота, напряжение) полностью совпали с параметрами сборных шин.",causes:["Успешное выполнение автоматического или ручного алгоритма подгонки параметров ДГУ перед включением генераторного автомата"],steps:["Техническое вмешательство не требуется. Код фиксирует штатное разрешение автоматики на замыкание силовых контактов выключателя ДГУ."],related:"1455, 1457",source:"external/google-ai",verified:false},
  1917:{what:"Уровень дизельного топлива в расходном баке (day tank) приблизился к минимальной критической точке останова. Это последнее предупреждение перед глушением ДГУ.",causes:["Полный отказ системы автоматической подкачки топлива в расходный бак при работающей ДГУ","Критический засор подающего топливного трубопровода или заклинивание электромагнитного клапана наполнения расходного бака"],steps:["Немедленно проверять работу внешнего топливного насоса подкачки и состояние запорной арматуры топливотрассы","Убедиться, что в основном топливохранилище есть запас топлива","При необходимости перевести систему наполнения бака в ручной режим управления для предотвращения останова по сухому ходу"],related:"1439, 1918",source:"PCC_3_3_Rus.pdf, Табл. 6",verified:true},
  1918:{what:"Уровень топлива упал до предельного минимума. Контроллер выполнил аварийный останов, чтобы предотвратить завоздушивание прецизионной топливной аппаратуры двигателя и ТНВД.",causes:["Полное опорожнение топливного бака из-за несвоевременной заправки","Масштабная утечка (слив, пробой) дизельного топлива из бака","Поломка или заклинивание поплавкового механизма датчика уровня в нижнем положении"],steps:["Визуально проверить наличие дизельного топлива в баке. Осмотреть установку на предмет утечек солярки","Организовать заправку бака топливом","Если бак полон, проверить исправность датчика уровня топлива и прозвонить его кабель на отсутствие обрыва","После заправки (и прокачки системы, если топливо выработалось полностью) нажать кнопку СБРОС"],related:"1441, 1917",source:"PCC_3_3_Rus.pdf, Табл. 6, стр. 120",verified:true},

  1944:{what:"Выходные реле аннунциатора PCCNet (HMI 113) активируются более чем от одного источника одновременно. Это <strong>предупреждение</strong>.",causes:["<strong>Аннунциатор подключён к двум или более контроллерам ГУ одновременно</strong> — каждый контроллер пытается управлять реле","<strong>Неисправен аннунциатор</strong>"],steps:["<strong>Убедитесь, что аннунциатор подключён только к одному контроллеру ГУ.</strong> Код 1944 активируется, когда любое из четырёх реле аннунциатора управляется более чем одним источником в сети PCCNet.","<strong>Если аннунциатор подключён к нескольким контроллерам</strong> — отключите лишние соединения, оставив только одно.","<strong>Если подключение корректно</strong> — замените аннунциатор.","После устранения причины нажмите кнопку <strong>СБРОС</strong>."],related:"1853, 1854, 1855",source:"0900-0670_I10_201204.pdf, раздел 10.8.96, стр. 473",verified:true},

  1974:{what:"Сигнал датчика давления картерных газов превысил предупредительный порог. Масло находится под избыточным давлением, возможен скорый останов по коду 556.",causes:["Постепенное засорение фильтрующего элемента или сетки системы вентиляции картера (сапуна)","Начальная стадия повышенного прорыва рабочих газов из камер сгорания в картер из-за износа поршневых колец"],steps:["Проверить и заменить фильтр сапуна (вентиляции картера) ДГУ.","Убедиться, что дренажная трубка слива газов не пережата, не забита грязью или льдом.","Проверить датчик давления в картере на достоверность показаний механическим манометром низкого давления."],related:"556, 1992",source:"external/google-ai",verified:false},

  2328:{what:"Информационное событие. Контроллер зафиксировал, что параметры напряжения и частоты внешней энергосети пришли в норму и находятся внутри рабочего окна допуска.",causes:["Восстановление стабильного электроснабжения со стороны внешней сети после аварии или отключения"],steps:["Техническое вмешательство не требуется. Код информирует логику АВР о возможности обратного переключения объекта на питание от сети."],related:"1223, 2332",source:"external/google-ai",verified:false},
  2331:{what:"В режиме PTC: напряжение питающей сети опустилось ниже порога <strong>«Utility Undervoltage Drop-Out Threshold»</strong> на время <code>Utility Undervoltage Drop-Out Delay</code>. Это <strong>предупреждение</strong> о пониженном напряжении в сети.",causes:["<strong>Неверно заданы параметры порога:</strong> Utility Undervoltage Drop-out percentage и Drop-out Delay","<strong>Реально низкое или нестабильное напряжение питающей сети</strong>"],steps:["<strong>Проверьте параметры порога:</strong> Setup → Paralleling Setup → Power Transfer Control → Drop out и Drop-Out Delay. Убедитесь в корректности настроек для данного применения.","<strong>Если напряжение сети реально нестабильно</strong> — обратитесь к поставщику электроэнергии.","После устранения причины нажмите кнопку <strong>СБРОС</strong>."],related:"2358, 1223, 1225",source:"0900-0670_I10_201204.pdf, раздел 10.8.98, стр. 473",verified:true},
  2332:{what:"Информационное событие. Контроллер через блок-контакты подтвердил, что силовой автомат ввода сети (Utility Breaker) успешно замкнулся. Объект запитан от внешней сети.",causes:["Штатное срабатывание привода сетевого автомата по команде системы автоматизации объекта"],steps:["Действия по ремонту не требуются. Код подтверждает успешное завершение фазы переключения на сеть."],related:"1219, 2328",source:"external/google-ai",verified:false},
  2333:{what:"Информационное событие. Контроллер зафиксировал успешное замыкание силового автомата генератора (Genset Breaker). ДГУ приняла нагрузку объекта или вышла на общую шину параллельной работы.",causes:["Штатное включение генераторного выключателя в автоматическом или ручном режиме работы"],steps:["Техническое вмешательство не требуется. Запись подтверждает подачу мощности от ДГУ потребителям."],related:"1328, 1452",source:"external/google-ai",verified:false},
  2335:{what:"Контроллер потерял измерение напряжения AC — все цепи измерения напряжения и тока недоступны. Физически: контроллер не может рассчитывать мощность без сигналов напряжения. Это <strong>критический аварийный останов</strong> — Battle Short его не обходит.",causes:["<strong>Неверно задан параметр «Lost AC Voltage Threshold»</strong>","<strong>Потеря всех цепей измерения напряжения и тока</strong> — отключены или нет сигналов на входах: напряжение L1–J22-1, L2–J22-2, L3–J22-3; ток L1–J12-1/J12-4, L2–J12-2/J12-5, L3–J12-3/J12-6","<strong>Неисправен ТН (PT)</strong> при напряжении >600 В"],steps:["<strong>Проверьте параметр Lost AC Voltage Threshold:</strong> Setup → OEM Setup → OEM ALT Setup → Lost AC Voltage Threshold. Убедитесь, что значение корректно для данного применения.","<strong>Проверьте цепи измерения напряжения</strong> при работающем двигателе: L1 — J22-1, L2 — J22-2, L3 — J22-3. Убедитесь в наличии напряжения на этих входах.","<strong>Проверьте цепи измерения тока:</strong> L1 — J12-1/J12-4, L2 — J12-2/J12-5, L3 — J12-3/J12-6.","<strong>При наличии ТН</strong> — проверьте входы и выходы ТН.","После устранения причины нажмите кнопку <strong>СБРОС</strong>."],related:"1446, 1447, 2914",source:"0900-0670_I10_201204.pdf, раздел 10.8.99, стр. 474",verified:true},
  2336:{what:"Проверка целостности памяти контроллера выявила <strong>повреждённые блоки памяти (corrupted memory blocks)</strong>. Контроллер выполнил <strong>аварийный останов</strong>. Признак: все светодиоды на базовой плате мигают одновременно.",causes:["<strong>Повреждение памяти базовой платы</strong> — программная или аппаратная причина"],steps:["<strong>Выполните начальную калибровку (Initial Calibration)</strong> базовой платы с использованием актуальных файлов Incal через InPower.","<strong>Если обновление Incal не устранило проблему</strong> — замените базовую плату контроллера.","<strong>Обратитесь к авторизованному сервисному центру Cummins</strong> для получения актуальных файлов Incal."],related:"",source:"0900-0670_I10_201204.pdf, раздел 10.8.100, стр. 474",verified:true},

  2882:{what:"Активирован конфигурируемый аналоговый/дискретный вход №1 блока <strong>AUX101</strong> (разъём J11). Это <strong>предупреждение</strong>. Функция входа задаётся при пусконаладке — без знания конкретного назначения нельзя определить причину.",causes:["<strong>Реальное срабатывание условия/датчика</strong>, для которого настроен вход","<strong>Неверная настройка полярности:</strong> если Sensor Type = active close, то active open инвертирует логику и вызывает ложное срабатывание","<strong>Неисправен выключатель/датчик</strong>","<strong>Неисправен разъём</strong> — окисление, погнутые контакты, влага, повреждение уплотнений","<strong>Неисправна проводка к плате AUX101</strong> — обрыв или КЗ"],steps:["<strong>Определите назначение входа:</strong> Setup → Aux 101 Setup. Проверьте условие, для которого он настроен; устраните причину; нажмите СБРОС.","<strong>Проверьте полярность:</strong> Analog/Switch Input #1 Active State Selection — убедитесь, что active closed/active open соответствует схеме подключения.","<strong>Проверьте выключатель:</strong> осмотрите визуально; измерьте сопротивление — замкнут <10 Ом, разомкнут >100 кОм.","<strong>Проверьте разъём</strong> на погнутые/сломанные контакты, окисление, влагу, повреждение уплотнений.","<strong>Проверьте проводку (J11):</strong> клеммы J11-1 (ref) и J11-2 (switch). Сопротивление от J11-2 до корпуса двигателя (с отключённым выключателем) >100 кОм. Целостность жгута: сигнальный провод <10 Ом; изоляция между проводами >100 кОм.","После устранения нажмите кнопку <strong>СБРОС</strong>."],related:"2883, 2884, 2885, 2886, 2887, 2888",source:"Cummins-DFEJ-DFEK-service-manual.pdf (A063S746 Issue 1), раздел 5.6.14, стр. 91",verified:false},

  2895:{what:"Устройство сети PCCNet потеряло связь с контроллером. Это <strong>предупреждение</strong> — генераторная установка продолжает работу, но устройство PCCNet (аннунциатор, операторская панель и т.д.) не отвечает.",causes:["<strong>Потеря сетевой связи PCCNet</strong> с устройством","<strong>Недостаточное напряжение питания устройства</strong>","<strong>Неисправность кабеля или неверная полярность подключения RS485</strong>","<strong>Неисправно само устройство PCCNet</strong>"],steps:["<strong>Найдите устройство с красным индикатором сети</strong> — красный LED означает потерю связи.","<strong>Проверьте напряжение питания устройства</strong> (норма: 12–24 В) непосредственно на входе устройства, а не у источника.","<strong>Проверьте наличие heartbeat</strong> — индикатор должен мигать раз в секунду при нормальной работе.","<strong>Проверьте кабельные соединения PCCNet:</strong> сеть полярно-чувствительна — RS485+ контроллера → RS485+ устройства; RS485− контроллера → RS485− устройства. Экран заземляется только в одной точке.","<strong>Если предыдущие шаги в норме</strong> — замените сетевое устройство.","<strong>Если замена не помогла</strong> — возможна проблема с заземляющим контуром, помехами EMI или неверным типом сетевого кабеля. Как тест: подключите устройство на расстоянии 0,6–1,5 м от базовой платы через TB1-5 (B+) и TB1-3 (GND) с правильным кабелем.","После устранения причины нажмите кнопку <strong>СБРОС</strong>."],related:"2896",source:"0900-0670_I10_201204.pdf, раздел 10.8.115, стр. 485",verified:true},

  3131:{what:"Вспомогательный аппаратный контур защиты панели зафиксировал превышение критического порога оборотов (Overspeed). Выполнен дублирующий экстренный останов. Battle Short не блокирует этот код.",causes:["Механический разнос дизеля (заклинивание ТНВД, подсос паров масла во впуск из турбины)","Сбой или наводки в цепи резервного датчика частоты вращения (например, датчика распредвала)"],steps:["ВНИМАНИЕ: Если двигатель пошёл в разнос — запрещается пуск до полной дефектовки механики!","Проверить механические тяги актуатора и рейку ТНВД на предмет заеданий.","Очистить резервный датчик скорости от стружки, проверить зазор и целостность экрана его кабеля."],related:"234, 236",source:"external/google-ai",verified:false},
  3397:{what:"Немедленный аварийный останов из-за срабатывания выключателя давления масла редуктора, зафиксированного через AUX101. Условие: средняя частота вращения двигателя превышает порог <strong>Gearbox Engine Speed Threshold</strong> в течение времени <strong>Gearbox Dwell Time</strong>. <strong>⚠ Редуктор содержит горячее масло — избегайте контакта с ним.</strong>",causes:["<strong>Недостаточный уровень масла в редукторе</strong>","<strong>Утечка масла редуктора</strong>","<strong>Недостаточное время Gearbox Dwell Time</strong> — выключатель не успевает перейти в неактивное состояние","<strong>Порог Gearbox Engine Speed Threshold задан слишком низко</strong>","<strong>Неверная схема проводки выключателя давления</strong>","<strong>Недостаточный расход масла</strong>","<strong>Неисправен обратный клапан масляного насоса редуктора</strong>","<strong>Неисправен выключатель давления масла редуктора</strong>","<strong>Неисправен AUX101</strong>"],steps:["<strong>⚠ Осторожно: горячее масло в редукторе.</strong>","<strong>Проверьте уровень масла в редукторе</strong> и долейте при необходимости согласно руководству по обслуживанию.","<strong>Проверьте на утечки масла:</strong> осмотрите резьбовые соединения, прокладки, усталостные трещины. Устраните обнаруженные течи.","<strong>Проверьте параметр Gearbox Dwell Time через InPower</strong> (по умолчанию 5 сек) — при необходимости увеличьте для стабилизации выключателя.","<strong>Проверьте параметр Gearbox Engine Speed Threshold через InPower</strong> (по умолчанию 600 об/мин) — убедитесь в корректности для данного применения.","<strong>Проверьте проводку выключателя давления</strong> — КЗ проводов имитирует срабатывание выключателя; устраните неисправность.","<strong>Проверьте выключатель давления:</strong> измерьте сопротивление при низком давлении (активное) и при рабочем давлении (неактивное). Если сопротивления равны — замените выключатель.","<strong>Проверьте AUX101</strong> на корректность передачи состояния выключателя."],related:"3398, 3399",source:"0900-0670_I10_201204.pdf, раздел 10.8.141, стр. 501",verified:true},
  3398:{what:"Управляемый останов из-за срабатывания датчика <strong>температуры масла редуктора</strong> (через AUX101). Температура масла превысила порог активации датчика. <strong>⚠ Редуктор содержит горячее масло — избегайте контакта с ним.</strong>",causes:["<strong>Неверный уровень масла в редукторе</strong> — слишком мало (перегрев) или слишком много (пенообразование)","<strong>Неверный тип масла</strong> — плохая теплоотдача","<strong>Внешний источник тепла</strong> вблизи редуктора или датчика температуры","<strong>Неверная схема проводки или неисправен датчик температуры</strong>","<strong>Недостаточный расход масла</strong>","<strong>Неверный зазор шестерён редуктора</strong> (слишком мал или слишком велик)","<strong>Неисправен AUX101</strong>"],steps:["<strong>⚠ Осторожно: горячее масло в редукторе.</strong>","<strong>Проверьте уровень масла</strong> — при низком уровне долейте; при избытке — слейте до нормы. Обратитесь к руководству по обслуживанию ГУ.","<strong>Проверьте тип масла</strong> на соответствие спецификации. При необходимости смените масло.","<strong>Устраните внешний источник тепла</strong> вблизи редуктора.","<strong>Проверьте датчик температуры:</strong> измерьте сопротивление в холодном (неактивном) и горячем (активном) состоянии. Если сопротивления равны — замените датчик. Также проверьте проводку на КЗ.","<strong>Проверьте зазор шестерён редуктора</strong> — обратитесь к специалисту Cummins.","<strong>Проверьте AUX101</strong> на корректность передачи состояния датчика."],related:"3397, 3399",source:"0900-0670_I10_201204.pdf, раздел 10.8.142, стр. 503",verified:true},
  3399:{what:"Немедленный аварийный останов из-за срабатывания реле <strong>дифференциальной токовой защиты</strong> (зафиксировано через AUX101). Дифференциальная защита реагирует на дисбаланс токов в обмотках генератора — признак КЗ или повреждения изоляции. Это <strong>критический аварийный останов</strong>. <strong>⚠ Не подавайте питание на ТТ без нагрузки — это может привести к взрыву ТТ.</strong>",causes:["<strong>Неверное подключение или несоответствие дифференциальных ТТ</strong> — все ТТ должны иметь идентичные характеристики","<strong>Дисбаланс токов нагрузки</strong> — несимметричная нагрузка","<strong>Неисправен дифференциальный ТТ</strong> — внутренний обрыв или КЗ","<strong>Неисправно реле дифференциальной защиты</strong>","<strong>Повреждение изоляции или КЗ в обмотке генератора</strong>","<strong>Неисправен AUX101</strong> — некорректно передаёт состояние реле"],steps:["<strong>⚠ Дайте двигателю остыть. Не подавайте питание на ТТ без нагрузки.</strong>","<strong>Проверьте подключение всех ТТ и реле:</strong> затяните соединения; убедитесь в правильности зазоров между фазами (минимум 1 дюйм/кВ + 1 дюйм); убедитесь, что вторичные проводники не проходят параллельно первичным.","<strong>Проверьте балансировку нагрузки</strong> — токи должны быть ниже порога срабатывания реле.","<strong>Проверьте ТТ:</strong> при неработающем генераторе измерьте сопротивление обмоток ТТ на КЗ и обрыв. Используйте CT-тестер или клещи AC для проверки рабочих характеристик.","<strong>Проверьте реле дифференциальной защиты:</strong> отключите все соединения и измерьте сопротивление между входными контактами ТТ — все группы должны быть примерно одинаковы.","<strong>Проверьте изоляцию обмоток генератора</strong> с помощью мегометра. При плохой изоляции — обратитесь к специалисту Cummins.","<strong>Проверьте AUX101</strong> — правильность подключения и передачи состояния."],related:"3397, 3398",source:"0900-0670_I10_201204.pdf, раздел 10.8.143, стр. 505",verified:true},

  3415:{what:"Панель выдала команду на запуск ДГУ, но концевые выключатели автоматических воздушных жалюзи (Louvres) сигнализируют о том, что створки остались в закрытом положении. Опасность мгновенного перегрева.",causes:["Отсутствие питания на электроприводе (например, Belimo) воздушных жалюзи контейнера","Механическое замерзание, обледенение или заклинивание створок жалюзи в зимний период","Неправильная регулировка, поломка или обрыв цепи концевых выключателей крайнего положения створок"],steps:["Проверить наличие питания ~220 В или =24 В на исполнительных электроприводах жалюзи.","Визуально осмотреть створки, очистить их от наледи, грязи или посторонних предметов, проверить плавность хода привода.","Проверить исправность концевиков: клемма контроля должна чётко изменять состояние при полном открытии створок.","После восстановления подвижности створок нажать кнопку СБРОС."],related:"151, 2934",source:"external/google-ai",verified:false},

  3417:{what:"Контроллер обнаружил отключение автомата защиты цепи антиконденсатного подогревателя обмоток генератора (Anti-Condensation Heater). Обмотки уязвимы для скопления влаги во время простоя.",causes:["Короткое замыкание или повреждение изоляции внутри гибкого нагревательного элемента (ТЭНа) генератора","Срабатывание дифференциальной защиты (УЗО) из-за утечки тока на корпус альтернатора через ТЭН","Физический обрыв цепи питания подогревателя"],steps:["ВНИМАНИЕ: Проверку проводить строго на остановленной установке при отключённых силовых цепях!","Проверить автомат защиты цепи подогрева обмоток (обычно находится в коробке выводов генератора или щите СН).","Измерить мегомметром сопротивление изоляции ТЭНа относительно корпуса альтернатора.","Проверить целостность нагревательного кабеля/элемента на обрыв, измерив его сопротивление мультиметром."],related:"2415, 3411",source:"external/google-ai",verified:false},
  3457:{what:"Разомкнутая цепь (обрыв) во всех трёх фазах измерения напряжения шины в приложениях Isolated Bus или Utility Multiple. Это <strong>предупреждение</strong> о том, что контроллер не видит напряжения шины. Цель кода — предотвратить замыкание автомата ГУ на шину, которая на самом деле находится под напряжением, но не видна контроллеру.",causes:["<strong>Обрыв или неверное подключение цепей измерения напряжения шины</strong> на TB7","<strong>Перепутаны линии kW load share и kVAR</strong>","<strong>Неисправен ТН шины</strong>","<strong>Перегорел предохранитель шины</strong> после технического обслуживания"],steps:["<strong>Проверьте соединение TB7 с базовой платой</strong> — убедитесь в надёжном подключении разъёма.","<strong>Проверьте предохранители шины</strong> после обслуживания — убедитесь, что они включены.","<strong>Проверьте цепи измерения напряжения шины:</strong> при ≤600 В — напряжение должно присутствовать на TB7-1 (L1), TB7-2 (L2), TB7-3 (L3) при работе двигателя.","<strong>При напряжении >600 В</strong> — проверьте схему от платы до ТН шины и от ТН до шины.","<strong>Убедитесь, что линии kW и kVAR load share не перепутаны.</strong>","После устранения причины нажмите кнопку <strong>СБРОС</strong>."],related:"1456, 1457",source:"0900-0670_I10_201204.pdf, раздел 10.8.151, стр. 511",verified:true},
