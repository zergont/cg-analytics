  3513:{what:"Токи обратной последовательности в выходных фазах генераторной установки превысили допустимый порог. Это <strong>предупреждение</strong>. Физический смысл: при несимметричной нагрузке или потере фазы возникают токи обратной последовательности, которые вызывают нагрев ротора генератора и могут привести к его повреждению.",causes:["<strong>Несимметричная нагрузка</strong> — значительная разница токов между фазами","<strong>Потеря одной фазы нагрузки</strong>","<strong>Неверный коэффициент ТТ</strong> — приводит к ошибочному расчёту токов","<strong>КЗ между фазами</strong>"],steps:["<strong>Проверьте симметрию нагрузки</strong> по всем трём фазам — разница токов не должна превышать допустимого предела.","<strong>Проверьте наличие всех трёх фаз нагрузки</strong> — нет ли обрыва в одной из фаз.","<strong>Проверьте коэффициент ТТ</strong> — см. код 2814.","<strong>Проверьте нагрузку и кабели</strong> на наличие КЗ.","После устранения причины нажмите кнопку <strong>СБРОС</strong>."],related:"1471, 1472, 1913",source:"0900-0670_I10_201204.pdf, стр. 380",verified:true},
  3599:{what:"Измерительный сигнал от трансформатора тока нулевой последовательности (датчика токов утечки на землю) вышел за рамки физической шкалы измерения или калибровки.",causes:["Обрыв или КЗ во вторичной цепи трансформатора тока защиты от замыканий на землю","Высокий уровень импульсных высокочастотных помех в контуре заземления электростанции"],steps:["Проверить целостность и плотность контактов сигнального кабеля, идущего от ТТ нулевой последовательности к плате PCC.","Проверить отсутствие прямого КЗ измерительных жил на землю.","Выполнить повторную калибровку нуля измерительного канала утечки через InPower."],related:"1417, 2938",source:"external/google-ai",verified:false},
  3611:{what:"Сработала дополнительная программируемая токовая защита, настроенная пользователем (уставка и время задержки задаются индивидуально при пусконаладке, отличные от заводских констант альтернатора).",causes:["Превышение током нагрузки специфического порога, заданного для защиты конкретного технологического оборудования объекта","Некорректно (занижено) выставленное значение тока в меню пользовательских защит"],steps:["Проверить параметры уставки Custom Overcurrent в меню конфигурации панели через InPower.","Зафиксировать токи по фазам в момент сработки, определить перегруженную ветку потребителей.","После разгрузки или корректировки уставки (в пределах паспортного номинала) нажать кнопку СБРОС."],related:"1471, 1472",source:"external/google-ai",verified:false},
  3629:{what:"Внутренняя диагностика панели обнаружила несоответствие версий метаданных или рекомендует провести плановое обновление калибровочной прошивки чипа для оптимизации измерительных каналов.",causes:["Заводское сервисное предписание Cummins (TSB) при обновлении основного софта InPower","Незначительный дрейф параметров контрольных сумм областей памяти"],steps:["Код носит рекомендательный характер, работа ДГУ не блокируется.","При следующем плановом ТО подключить InPower и обновить файл калибровок устройства до актуальной версии."],related:"3631, 2813",source:"external/google-ai",verified:false},
  3631:{what:"Критическая программная ошибка. Контроллер зафиксировал полную потерю достоверности или критическое повреждение калибровочной таблицы измерительных каналов. Запуск заблокирован во избежание аварии.",causes:["Аппаратный сбой секторов флэш-памяти или ПЗУ контроллера PCC","Неудачная попытка записи/обновления прошивки, прерванная по питанию или связи"],steps:["Подключить ноутбук с InPower и выполнить полную принудительную перезапись (прошивку) файла калибровок устройства.","Обеспечить бесперебойное питание контроллера в процессе прошивки.","Если контроллер выдаёт ошибку памяти при записи калибровок — плата PCC подлежит замене."],related:"3629, 2813, 342",source:"external/google-ai",verified:false},
  3999:{what:"Внутренняя системная ошибка программного обеспечения контроллера, вызванная математическим исключением в коде прошивки (например, деление на ноль или выход за границы массива данных).",causes:["Редкое нештатное сочетание внешних параметров и внутренних таймеров автоматики","Повреждение области исполняемого кода во флэш-памяти контроллера"],steps:["Сбросить ошибку и перезагрузить панель по постоянному току.","Если код появляется регулярно при определённых режимах — обновить микропрограмму панели PCC до последней официальной версии через InPower.","При стойком сбое — передать лог неисправностей в службу технической поддержки Cummins."],related:"2952, 2813",source:"external/google-ai",verified:false},

  `<span class="stat-pill sh">Останов: ${cnt.sh}</span>` +
  `<span class="stat-pill sc">Останов с охл.: ${cnt.sc}</span>` +
  `<span class="stat-pill wa">Предупреждение: ${cnt.wa}</span>` +
  `<span class="stat-pill de">Снижение номинала: ${cnt.de}</span>` +
  `<span class="stat-pill ev">Событие: ${cnt.ev}</span>`;

let sortDir=1, sortKey='code', activeCode=null;

function badge(s){
  return `<span class="badge ${s}">${labels[s]}</span>`;
}

function clearSearch() {
  document.getElementById('search').value = '';
  document.getElementById('clearBtn').classList.remove('visible');
  filter();
}

function filterAndToggleClear() {
  const val = document.getElementById('search').value;
  document.getElementById('clearBtn').classList.toggle('visible', val.length > 0);
  filter();
}

function filter(){
  const q = document.getElementById('search').value.toLowerCase();
  const s = document.getElementById('sev').value;
  const tb = document.getElementById('tbody');
  let html = '', shown = 0;
  const arr = [...data].sort((a,b) => sortDir*(a[0]-b[0]));
  for (const [code,sev,en,ru] of arr) {
    if (s && sev !== s) continue;
    if (q && !String(code).includes(q) && !en.toLowerCase().includes(q) && !ru.toLowerCase().includes(q)) continue;
    const hasDoc = !!docs[code];
    const isActive = code === activeCode;
    const btnHtml = hasDoc
      ? `<button class="info-btn${isActive?' active':''}" onclick="openPanel(${code})">📋 РЭ</button>`
      : `<span style="color:var(--border);font-size:11px;">—</span>`;
    html += `<tr class="${isActive?'active-row':''}" id="row-${code}">
      <td class="code">${code}</td>
      <td>${badge(sev)}</td>
      <td class="en-text">${en}</td>
      <td class="ru-text">${ru}</td>
      <td>${btnHtml}</td>
    </tr>`;
    shown++;
  }
  tb.innerHTML = html || `<tr><td colspan="5" class="no-results">Ничего не найдено</td></tr>`;
  document.getElementById('cnt').textContent = `Показано: ${shown} / ${data.length}`;
}

function sortBy(key){
  sortDir = (sortKey===key) ? -sortDir : 1;
  sortKey = key;
  document.getElementById('arr-code').textContent = sortDir > 0 ? '↑' : '↓';
  document.getElementById('th-code').classList.add('sorted');
  filter();
}

function openPanel(code){
  activeCode = code;
  const row = data.find(r => r[0]===code);
  const d = docs[code];
  document.getElementById('p-code').textContent = code;
  document.getElementById('p-title').textContent = row ? row[2] : '';

  let html = '';

  // Badge
  if (row) {
    html += `<div class="panel-section"><div class="panel-section-title">Тип</div>
      <div class="panel-section-body">${badge(row[1])} &nbsp; <span style="color:var(--muted);font-size:12px;">${row[3]}</span></div></div>`;
  }

  if (d) {
    // What
    if (d.what) {
      html += `<div class="panel-section">
        <div class="panel-section-title">Что означает</div>
        <div class="panel-section-body">${d.what}</div>
      </div>`;
    } else if (d.desc) {
      html += `<div class="panel-section">
        <div class="panel-section-title">Что означает</div>
        <div class="panel-section-body">${d.desc}</div>
      </div>`;
    }

    // Causes
    if (d.causes && d.causes.length) {
      const causesHtml = d.causes.map(c => `<div class="step">${c}</div>`).join('');
      html += `<div class="panel-section">
        <div class="panel-section-title">Возможные причины</div>
        <div class="panel-section-body">${causesHtml}</div>
      </div>`;
    }

    // Steps
    if (d.steps && d.steps.length) {
      const stepsHtml = d.steps.map((s,i) =>
        `<div class="step"><strong>${i+1}.</strong> ${s}</div>`
      ).join('');
      html += `<div class="panel-section">
        <div class="panel-section-title">Меры устранения</div>
        <div class="panel-section-body">${stepsHtml}</div>
      </div>`;
    }

    // Related
    if (d.related) {
      html += `<div class="panel-section">
        <div class="panel-section-title">Связанные коды</div>
        <div class="panel-section-body" style="color:var(--accent);font-family:var(--font-mono)">${d.related}</div>
      </div>`;
    }

    // Source
    html += `<div class="panel-source">📄 Источник: ${d.source}</div>`;
  } else {
    html += `<div class="panel-section"><p class="no-doc">Подробное описание в загруженной документации не найдено.<br>Обратитесь к официальному представителю по обслуживанию Cummins.</p></div>`;
  }

  document.getElementById('p-body').innerHTML = html;
  document.getElementById('panel').classList.add('open');
  document.body.classList.add('panel-open');
  filter(); // update active row highlight
}

function closePanel(){
  activeCode = null;
  document.getElementById('panel').classList.remove('open');
  document.body.classList.remove('panel-open');
  filter();
}

// Close on Escape
document.addEventListener('keydown', e => { if(e.key==='Escape') closePanel(); });

function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
  document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('themeBtn').textContent = isDark ? '🌙' : '☀️';
  localStorage.setItem('theme', isDark ? 'light' : 'dark');
}

// Восстанавливаем тему при загрузке
(function() {
  const saved = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  document.addEventListener('DOMContentLoaded', function() {
    const btn = document.getElementById('themeBtn');
    if (btn) btn.textContent = saved === 'light' ? '🌙' : '☀️';
  });
})();


filter();
