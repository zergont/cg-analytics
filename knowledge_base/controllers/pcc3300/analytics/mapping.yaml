# Маппинг addr → роль → группа → единица измерения
# Whitelist регистров для аналитического блока KTA50/PCC3300
# Источник: ТЗ аналитики, раздел 2.3
# Изменение: только через веб-морду (раздел 9 ТЗ)

registers:

  # ═══════════════════════════════════════════════════════════════
  # ГРУППА НАГРУЗКИ  (kind: analog → из history_rich)
  # ═══════════════════════════════════════════════════════════════

  40034:
    role: ACTIVE_POWER_TOTAL
    domain: GENERATOR
    trip_snapshot: true
    group: LOAD
    unit: kW
    kind: analog
    description: Суммарная активная мощность (3 фазы)
    _source: PASSPORT_РЭ

  40031:
    role: ACTIVE_POWER_L1
    domain: GENERATOR
    group: LOAD
    unit: kW
    kind: analog
    description: Активная мощность фаза L1
    _source: PASSPORT_РЭ

  40032:
    role: ACTIVE_POWER_L2
    domain: GENERATOR
    group: LOAD
    unit: kW
    kind: analog
    description: Активная мощность фаза L2
    _source: PASSPORT_РЭ

  40033:
    role: ACTIVE_POWER_L3
    domain: GENERATOR
    group: LOAD
    unit: kW
    kind: analog
    description: Активная мощность фаза L3
    _source: PASSPORT_РЭ

  40025:
    role: VOLTAGE_LL_AVG
    domain: GENERATOR
    group: LOAD
    unit: Vac
    kind: analog
    description: Среднее линейное напряжение (LL) — используется для расчёта I_номинального
    _source: PASSPORT_РЭ

  40035:
    role: REACTIVE_POWER_L1
    domain: GENERATOR
    group: LOAD
    unit: kVAR
    kind: analog
    description: Реактивная мощность фаза L1 — нужна для угла φ_L1 (метод A, I₂)
    _source: PASSPORT_РЭ

  40036:
    role: REACTIVE_POWER_L2
    domain: GENERATOR
    group: LOAD
    unit: kVAR
    kind: analog
    description: Реактивная мощность фаза L2 — нужна для угла φ_L2 (метод A, I₂)
    _source: PASSPORT_РЭ

  40037:
    role: REACTIVE_POWER_L3
    domain: GENERATOR
    group: LOAD
    unit: kVAR
    kind: analog
    description: Реактивная мощность фаза L3 — нужна для угла φ_L3 (метод A, I₂)
    _source: PASSPORT_РЭ

  40038:
    role: REACTIVE_POWER_TOTAL
    domain: GENERATOR
    group: LOAD
    unit: kVAR
    kind: analog
    description: Суммарная реактивная мощность
    _source: PASSPORT_РЭ

  40043:
    role: APPARENT_POWER_TOTAL
    domain: GENERATOR
    group: LOAD
    unit: kVA
    kind: analog
    description: Суммарная полная мощность
    _source: PASSPORT_РЭ

  40039:
    role: POWER_FACTOR
    domain: GENERATOR
    group: LOAD
    unit: PF
    kind: analog
    description: Коэффициент мощности
    _source: PASSPORT_РЭ

  40029:
    role: CURRENT_AVG
    domain: GENERATOR
    group: LOAD
    unit: A
    kind: analog
    description: Средний ток по трём фазам
    _source: PASSPORT_РЭ

  40026:
    role: CURRENT_L1
    domain: GENERATOR
    group: LOAD
    unit: A
    kind: analog
    description: Ток фаза L1
    _source: PASSPORT_РЭ

  40027:
    role: CURRENT_L2
    domain: GENERATOR
    group: LOAD
    unit: A
    kind: analog
    description: Ток фаза L2
    _source: PASSPORT_РЭ

  40028:
    role: CURRENT_L3
    domain: GENERATOR
    group: LOAD
    unit: A
    kind: analog
    description: Ток фаза L3
    _source: PASSPORT_РЭ

  40068:
    role: RPM
    domain: ENGINE
    trip_snapshot: true
    group: LOAD
    unit: rpm
    kind: analog
    description: Частота вращения двигателя
    _source: PASSPORT_РЭ

  40014:
    role: LOAD_PCT
    domain: GENERATOR
    trip_snapshot: true
    group: LOAD
    unit: "%"
    kind: analog
    description: Нагрузка в % от номинала (standby)
    priority: primary   # приоритетный источник LOAD_PCT
    _source: PASSPORT_РЭ

  43017:
    role: LOAD_PCT_TOTAL
    domain: GENERATOR
    group: LOAD
    unit: "%"
    kind: analog
    description: Нагрузка в % от номинала (total)
    priority: secondary
    _source: PASSPORT_РЭ

  43019:
    role: RATING_KW
    domain: GENERATOR
    group: LOAD
    unit: kW
    kind: analog
    description: Номинальная активная мощность установки
    _source: PASSPORT_РЭ

  43018:
    role: RATING_KVA
    domain: GENERATOR
    group: LOAD
    unit: kVA
    kind: analog
    description: Номинальная полная мощность установки
    _source: PASSPORT_РЭ

  # ═══════════════════════════════════════════════════════════════
  # ГРУППА ТЕРМОДИНАМИКИ  (kind: analog → из history_rich)
  # ═══════════════════════════════════════════════════════════════

  40064:
    role: COOLANT_TEMP
    domain: ENGINE
    trip_snapshot: true
    group: THERMO
    unit: "°C"
    kind: analog
    description: Температура охлаждающей жидкости (ОЖ)
    _source: PASSPORT_РЭ

  40063:
    role: OIL_TEMP
    domain: ENGINE
    trip_snapshot: true
    group: THERMO
    unit: "°C"
    kind: analog
    description: Температура масла двигателя
    _source: PASSPORT_РЭ

  # ═══════════════════════════════════════════════════════════════
  # ГРУППА ГИДРАВЛИКИ  (kind: analog → из history_rich)
  # ═══════════════════════════════════════════════════════════════

  40062:
    role: OIL_PRESS
    domain: ENGINE
    trip_snapshot: true
    group: HYDRAULIC
    unit: kPa
    kind: analog
    description: Давление масла в канале двигателя
    _source: PASSPORT_РЭ

  # ═══════════════════════════════════════════════════════════════
  # ГРУППА ЗДОРОВЬЯ / ЭЛЕКТРИКИ  (kind: analog → из history_rich)
  # ═══════════════════════════════════════════════════════════════

  40044:
    role: FREQUENCY
    domain: GENERATOR
    trip_snapshot: true
    group: HEALTH
    unit: Hz
    kind: analog
    description: Частота генератора
    _source: PASSPORT_РЭ

  40061:
    role: BATTERY_V
    domain: ENGINE
    trip_snapshot: true
    group: HEALTH
    unit: Vdc
    kind: analog
    description: Напряжение аккумулятора
    _source: PASSPORT_РЭ

  # ═══════════════════════════════════════════════════════════════
  # ГРУППА НАРАБОТКИ  (kind: analog → из history_rich, склеена в БД)
  # ═══════════════════════════════════════════════════════════════

  40070:
    role: ENGINE_HOURS
    domain: ENGINE
    group: STATE
    unit: h
    kind: analog
    description: Наработка двигателя (склеена в БД, выдаётся обработанной)
    _source: PASSPORT_РЭ

  40290:
    role: HEARTBEAT
    domain: CONTROLLER
    group: STATE
    unit: ~
    kind: analog
    description: >
      Счётчик/таймер — меняется при каждом опросе роутера (пинг связи).
      Используется исключительно для расчёта data_quality. Не участвует
      в детекции и не выводится в характеристики.
    quality_only: true
    _source: CONTROLLER

  # ═══════════════════════════════════════════════════════════════
  # ГРУППА СОСТОЯНИЯ / СОБЫТИЙ  (kind: enum → из enum_history)
  # ═══════════════════════════════════════════════════════════════

  40011:
    role: RUN_STATE
    domain: ENGINE
    group: STATE
    unit: ~
    kind: enum
    description: Genset Run Sequence State — основной сигнал сегментации L1
    states:
      0: Stop
      1: Time Delay to Start
      2: Warmup at Idle
      3: Rated Freq and Voltage
      4: Cooldown / Stop Delay
      5: Cooldown at Idle
      6: Rated to Idle Transition Delay
    _source: PASSPORT_РЭ

  40010:
    role: SWITCH_POS
    domain: CONTROLLER
    group: STATE
    unit: ~
    kind: enum
    description: Switch Position (ручной/автомат/выкл)
    _source: PASSPORT_РЭ

  40012:
    role: LAST_FAULT_CODE
    domain: CONTROLLER
    group: STATE
    unit: ~
    kind: analog
    description: Код последней неисправности
    _source: PASSPORT_РЭ

  40013:
    role: LAST_FAULT_TYPE
    domain: CONTROLLER
    group: STATE
    unit: ~
    kind: analog
    description: Тип последней неисправности (enum, справочно)
    states:
      0: None
      1: Warning
      2: Derate
      3: Shutdown with Cooldown
      4: Shutdown
    _source: PASSPORT_РЭ

  # ── Командные/исполнительные регистры — реконструкция действий (Следователь) ──
  # kind: enum → периоды из enum_history. Пока читаются только 40010/40011;
  # роли заведены для будущего широкого ридера и классификатора причины.
  40599:
    role: RUN_COMMAND
    domain: CONTROLLER
    group: STATE
    unit: ~
    kind: enum
    description: Genset Run Command (0 EmergencyStop / 1 Stop / 2 LoadDemandStop / 3 Run)
    _source: PASSPORT_РЭ

  40598:
    role: FUEL_SOLENOID
    domain: CONTROLLER
    group: STATE
    unit: ~
    kind: enum
    description: Команда топливного электромагнита (Active = подача топлива есть)
    _source: PASSPORT_РЭ

  40586:
    role: EXCITATION
    domain: CONTROLLER
    group: STATE
    unit: ~
    kind: enum
    description: Состояние возбуждения генератора (Disabled/Enabled)
    _source: PASSPORT_РЭ

  40563:
    role: ESTOP_EVENT
    domain: CONTROLLER
    group: STATE
    unit: ~
    kind: enum
    description: Событие общего аварийного останова (Inactive/Active)
    _source: PASSPORT_РЭ

  40569:
    role: FAULT_RESET
    domain: CONTROLLER
    group: STATE
    unit: ~
    kind: enum
    description: Сброс детектирования неисправностей (маркер действий восстановления)
    _source: PASSPORT_РЭ

  40584:
    role: PARALLEL_READY
    domain: CONTROLLER
    group: STATE
    unit: ~
    kind: enum
    description: Индикатор готовности к параллельной работе (Inactive/Active)
    _source: PASSPORT_РЭ

  43560:
    role: GENSET_CB_CLOSE_CMD
    domain: CONTROLLER
    group: STATE
    unit: ~
    kind: enum
    description: Команда на включение выключателя генераторной установки
    _source: PASSPORT_РЭ

  43562:
    role: GENSET_CB_POS
    domain: CONTROLLER
    group: STATE
    unit: ~
    kind: enum
    description: Положение выключателя генераторной установки (Open/Closed)
    _source: PASSPORT_РЭ

  46109:
    role: ENGINE_OP_STATE
    domain: CONTROLLER
    group: STATE
    unit: ~
    kind: enum
    description: Рабочее состояние двигателя (enum, справочно)
    _source: PASSPORT_РЭ

  # ═══════════════════════════════════════════════════════════════
  # FAULT MASKS 40400–40428  (kind: fault_bitmap → из fault_history)
  # Маски АКТИВНЫХ неисправностей — требуют внимания.
  # Регистры выше (40440+) — информационные события, в детекцию не идут.
  # Регистры хранятся как периоды активных битов.
  # Незадокументированные биты отсеивает декодер источника.
  # ═══════════════════════════════════════════════════════════════

  40400: {role: FAULT_MASK_0, domain: CONTROLLER,  group: FAULT, kind: fault_bitmap, _source: CONTROLLER}
  40401: {role: FAULT_MASK_1, domain: CONTROLLER,  group: FAULT, kind: fault_bitmap, _source: CONTROLLER}
  40402: {role: FAULT_MASK_2, domain: CONTROLLER,  group: FAULT, kind: fault_bitmap, _source: CONTROLLER}
  40403: {role: FAULT_MASK_3, domain: CONTROLLER,  group: FAULT, kind: fault_bitmap, _source: CONTROLLER}
  40404: {role: FAULT_MASK_4, domain: CONTROLLER,  group: FAULT, kind: fault_bitmap, _source: CONTROLLER}
  40405: {role: FAULT_MASK_5, domain: CONTROLLER,  group: FAULT, kind: fault_bitmap, _source: CONTROLLER}
  40406: {role: FAULT_MASK_6, domain: CONTROLLER,  group: FAULT, kind: fault_bitmap, _source: CONTROLLER}
  40407: {role: FAULT_MASK_7, domain: CONTROLLER,  group: FAULT, kind: fault_bitmap, _source: CONTROLLER}
  40408: {role: FAULT_MASK_8, domain: CONTROLLER,  group: FAULT, kind: fault_bitmap, _source: CONTROLLER}
  40409: {role: FAULT_MASK_9, domain: CONTROLLER,  group: FAULT, kind: fault_bitmap, _source: CONTROLLER}
  40410: {role: FAULT_MASK_10, domain: CONTROLLER, group: FAULT, kind: fault_bitmap, _source: CONTROLLER}
  40411: {role: FAULT_MASK_11, domain: CONTROLLER, group: FAULT, kind: fault_bitmap, _source: CONTROLLER}
  40412: {role: FAULT_MASK_12, domain: CONTROLLER, group: FAULT, kind: fault_bitmap, _source: CONTROLLER}
  40413: {role: FAULT_MASK_13, domain: CONTROLLER, group: FAULT, kind: fault_bitmap, _source: CONTROLLER}
  40414: {role: FAULT_MASK_14, domain: CONTROLLER, group: FAULT, kind: fault_bitmap, _source: CONTROLLER}
