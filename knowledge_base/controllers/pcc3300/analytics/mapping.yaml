  40419: {role: FAULT_MASK_19, domain: CONTROLLER, group: FAULT, kind: fault_bitmap, _source: CONTROLLER}
  40420: {role: FAULT_MASK_20, domain: CONTROLLER, group: FAULT, kind: fault_bitmap, _source: CONTROLLER}
  40421: {role: FAULT_MASK_21, domain: CONTROLLER, group: FAULT, kind: fault_bitmap, _source: CONTROLLER}
  40422: {role: FAULT_MASK_22, domain: CONTROLLER, group: FAULT, kind: fault_bitmap, _source: CONTROLLER}
  40423: {role: FAULT_MASK_23, domain: CONTROLLER, group: FAULT, kind: fault_bitmap, _source: CONTROLLER}
  40424: {role: FAULT_MASK_24, domain: CONTROLLER, group: FAULT, kind: fault_bitmap, _source: CONTROLLER}
  40425: {role: FAULT_MASK_25, domain: CONTROLLER, group: FAULT, kind: fault_bitmap, _source: CONTROLLER}
