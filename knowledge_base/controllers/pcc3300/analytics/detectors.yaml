# Переопределения детекторов, специфичные для контроллера PCC3300.
# Частичный слой: deep-merge поверх _defaults/analytics/detectors.yaml
# (см. AnalyticsConfig._deep_merge — вложенные dict сливаются по ключам).
# Изменение: только через веб-морду (раздел 9 ТЗ)

# ─── CONTROLLER_FAULT: параметры CommonAlarm-паттерна ───────────────────────
# Общая авария (CommonAlarm, 40408/11) — индикатор «есть ошибка», зажигает
# лампочку Внимание на панели. Сам бит INFO, но если он активен при
# несброшенном коде неисправности (40012 ≠ 0) и других активных не-INFO
# битах-неисправностях НЕТ — это несброшенная/неподтверждённая неисправность:
# промежуточное состояние между НОРМОЙ и WARNING → CAUTION (жёлтый).
# 40012 сбрасывается только кнопкой сброса после устранения причины.
CONTROLLER_FAULT:
  common_alarm_addr: 40408
  common_alarm_bit: 11
  unconfirmed_severity: CAUTION
