# Параметры алгоритма сегментации KTA50/PCC3300
# Источник: ТЗ аналитики, разделы 5.1–5.4
# Изменение: только через веб-морду (раздел 9 ТЗ)

# ─── ПРЕАМБУЛА ───────────────────────────────────────────────────────────────
# При открытии нового сегмента (смена 40011) в него включается преамбула:
# последние N аналоговых срезов ПЕРЕД фронтом смены из предыдущего сегмента.
# Цель — захватить значения, ставшие причиной смены режима.

preamble:
  slices: 3
  description: >
    Число срезов до фронта смены RUN_STATE, включаемых в новый сегмент.
    Применяется к аналоговым регистрам. Дискретные события режутся мгновенно.
  _source: TUNABLE

# ─── ПОДТВЕРЖДЕНИЕ ГРАНИЦЫ ЗОНЫ ─────────────────────────────────────────────
# Защита от ложного реза на границах зон нагрузки (только для непрерывных параметров).
# НЕ применяется к дискретным границам (смена 40011, fault-событие).

boundary_confirmation:
  n_stab: 3
  description: >
    Число последовательных срезов в новой зоне нагрузки для подтверждения перехода.
    Граница ставится ретроспективно по срезу первого отклонения (не по срезу подтверждения).
    Если значение вернулось в исходную зону раньше — это выброс, граница не создаётся.
  _source: TUNABLE

# ─── КАЧЕСТВО ДАННЫХ ─────────────────────────────────────────────────────────
# Критерии для пометки невычислимых скоростей и пониженного data_quality.

data_quality:
  # Максимальный интервал между записями (в единицах heartbeat_nominal_sec).
  # Если Δt > heartbeat_nominal_sec × heartbeat_max_multiplier — считаем разрывом.
  heartbeat_nominal_sec: 30    # номинальный интервал опроса Modbus (сек)
  heartbeat_max_multiplier: 3  # Δt > 30 × 3 = 90 сек → аномальный пропуск
  # Регистр-пинг: всегда меняется при каждом опросе (счётчик или время).
  # Используется как точный индикатор качества связи вместо усреднения по всем регистрам
  # (большинство регистров работают «report-by-exception» и почти не меняются в стабильном режиме).
  # data_quality = actual_ping_rows / expected_rows (duration / heartbeat_nominal_sec)
  heartbeat_addr: 40290
  description: >
    Скорости (V-метрики) через разрывы не вычисляются.
    data_quality считается по регистру-пингу (heartbeat_addr): число пришедших
    пакетов / ожидаемое число (duration / heartbeat_nominal_sec).
    Если heartbeat_addr не задан или нет данных — fallback на покрытие активных регистров.
  _source: TUNABLE

# ─── ИСТОЧНИК LOAD_PCT ───────────────────────────────────────────────────────
# Приоритет источников для определения зоны нагрузки.
# Используется в сегментации L2 (подсегменты внутри RUN_STATE=3).

# ─── КЛАССЫ СКОРОСТНЫХ МЕТРИК (Addendum v1.3) ────────────────────────────────
# Класс A (быстрые/безынерционные): ACTIVE_POWER, CURRENT, FREQUENCY, dRPM/dt
#   Мгновенная двухточечная скорость валидна. Только в RUN_STATE=3.
#
# Класс B (медленные/инерционные): OIL_PRESS, OIL_TEMP, COOLANT_TEMP, RPM stability
#   Диагностичен только устойчивый тренд по ≥ N_trend последовательным срезам.
#   Мгновенный «скачок» на двух точках — шум/квантование АЦП, не диагноз.

class_b_trend:
  N_trend: 3             # минимум реальных срезов для тренда класса B
                         # (при N_trend=3 и heartbeat=20с → ~40 сек устойчивого тренда)
  roles:                 # роли класса B (тренд вместо двухточечной скорости)
    - OIL_PRESS
    - OIL_TEMP
    - COOLANT_TEMP
    - RPM_STABILITY      # стабильность оборотов под нагрузкой (не быстрый отклик)

# ─── РЕЖИМНЫЕ ПЕРЕХОДЫ ──────────────────────────────────────────────────────
transitions:
  T_spinup_sec: 20          # норматив времени разгона ХХ→номинал (сек)
  T_stop_max_sec: 30        # максимальное время до RPM=0 после команды Stop.
                             # Если RPM не опустились до нуля — подозрение на клапан отсечки.
                             # Паспортного норматива нет (зависит от инерции ротора);
                             # 30 сек — практический ориентир.
  rpm_stopped_threshold: 50  # RPM ниже этого = «двигатель остановлен» (rpm)
  _source: TUNABLE

load_pct_source:
  primary_addr: 40014          # приоритетный: регистр LOAD_PCT (standby)
  fallback_role: ACTIVE_POWER_TOTAL  # запасной: 40034 / RATING_KW * 100
  rating_kw_addr: 43019        # номинал для вычисления % из кВт
  description: >
    Если значение primary_addr отсутствует или невалидно (None / N/A),
    вычисляем LOAD_PCT = ACTIVE_POWER_TOTAL / RATING_KW * 100.
  _source: TUNABLE

# ─── РЕЗ СТОП-ПЕРИОДА ПО УСТРАНЕНИЮ НЕИСПРАВНОСТЕЙ (v4.9.38) ────────────────
# «СТОП (авария)» → FAULT_CLEARED → «СТОП (готов к пуску)»: даёт метрику
# времени устранения и зелёный сегмент готовности в календаре.
# «Грязно» = активен не-INFO бит масок ИЛИ несброшенный код 40012.

fault_cleared:
  enabled: true
  # Чистота должна продержаться не меньше этого времени, иначе реза нет
  # (защита от «сброс → через минуту кнопка/новый код»). Граница ставится
  # на момент ПЕРВОГО чистого замера, а не на конец выдержки.
  stable_clean_sec: 300
  # Регистр несброшенного кода неисправности (LAST_FAULT_CODE)
  last_fault_code_addr: 40012
  _source: TUNABLE
