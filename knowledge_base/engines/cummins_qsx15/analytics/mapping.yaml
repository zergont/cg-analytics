# Дополнительные регистры двигателя QSX15 (ECM → J1939 → PCC3300 → Modbus)
# Слой ДВИГАТЕЛЯ: deep-merge ДОБАВЛЯЕТ эти регистры к mapping контроллера pcc3300.
# KTA50 (механический) эти данные не отдаёт — его whitelist не меняется.
#
# Наличие подтверждено опросом живой панели 2026-07-10:
#   живые:  40065, 40067, 40069, 40072, 40230, 40231, 40235, 40247, 40258, 40282
#   мёртвые (датчиков нет, НЕ добавлять): 40066 (Т топлива), 40232 (картер),
#   40242 (aftercooler), 40243-46 (Т ECM), 40248 (ECM #2)
#
# ПРИМЕЧАНИЕ по kind: статусные регистры (40231, 40235, 40282) заведены как
# analog — enum-выборка аналитики жёстко читает только 40011/40010 (шов H2).
# Медиана/min/max нулевого флага события всё равно показывает фронт.
#
# Изменение: только через веб-морду (раздел 9 ТЗ)

registers:

  # ═══════════════════════════════════════════════════════════════
  # ГРУППА ТЕРМОДИНАМИКИ — воздушный тракт
  # ═══════════════════════════════════════════════════════════════

  40065:
    role: INTAKE_MANIFOLD_TEMP
    trip_snapshot: true
    domain: ENGINE
    group: THERMO
    unit: "°C"
    kind: analog
    description: >
      Температура воздуха во впускном коллекторе (IMT, из ECM по J1939).
      Рост при той же нагрузке = загрязнение интеркулера (CAC).
    _source: ECM_J1939

  40230:
    role: BOOST_PRESSURE
    trip_snapshot: true
    domain: ENGINE
    group: THERMO
    unit: psi
    kind: analog
    description: >
      Давление наддува после турбокомпрессора (из ECM). Просадка при той же
      нагрузке = деградация турбины / утечки тракта / грязный CAC.
    _source: ECM_J1939

  # ═══════════════════════════════════════════════════════════════
  # ГРУППА ТОПЛИВА (новая, только электронные моторы)
  # ═══════════════════════════════════════════════════════════════

  40067:
    role: FUEL_RATE
    trip_snapshot: true
    domain: ENGINE
    group: FUEL
    unit: gal/h
    kind: analog
    description: >
      Мгновенный расход топлива (из ECM). База для удельного расхода
      г/кВт·ч против паспортной кривой DS-10349 — главный health index.
    _source: ECM_J1939

  40072:
    role: FUEL_TOTAL
    domain: ENGINE
    group: FUEL
    unit: gal
    kind: analog
    description: >
      Суммарный расход топлива с начала эксплуатации (32 бит, склеен в БД,
      выдаётся обработанным — как ENGINE_HOURS 40070).
    _source: ECM_J1939

  40258:
    role: FUEL_OUTLET_PRESS
    domain: ENGINE
    group: FUEL
    unit: psi
    kind: analog
    description: >
      Давление топлива на выходе из фильтра (32 бит, склеен в БД).
      Просадка под нагрузкой = забитый топливный фильтр.
    _source: ECM_J1939

  40282:
    role: WATER_IN_FUEL
    domain: ENGINE
    group: FUEL
    unit: ~
    kind: analog
    description: >
      Индикатор воды в топливе от датчика водоотделителя (0 = нет, 1 = есть).
      Любое ненулевое значение — событие качества топлива.
    _source: ECM_J1939

  # ═══════════════════════════════════════════════════════════════
  # ГРУППА ЗДОРОВЬЯ — электроника и деградация
  # ═══════════════════════════════════════════════════════════════

  40235:
    role: ECM_DERATE_REQUEST
    domain: ENGINE
    group: HEALTH
    unit: ~
    kind: analog
    description: >
      Запрос снижения мощности от ЭБУ двигателя. 3 = Don't Care (норма).
      Иное значение = мотор сам сообщает о проблеме — ранний сигнал
      до появления фолт-кода.
    _source: ECM_J1939

  40247:
    role: ECM_BATTERY_V
    domain: ENGINE
    group: HEALTH
    unit: Vdc
    kind: analog
    description: >
      Напряжение питания модуля ECM №1. Здоровье питания электроники
      двигателя (просадки = окисление контактов, слабая проводка).
    _source: ECM_J1939

  40231:
    role: ECM_LINK_STATE
    domain: CONTROLLER
    group: HEALTH
    unit: ~
    kind: analog
    description: >
      Состояние шины CAN/J1939 между PCC3300 и ЭБУ (1 = активна).
      Потеря линка = все ECM-параметры недостоверны.
    _source: CONTROLLER

  # ═══════════════════════════════════════════════════════════════
  # ГРУППА СОСТОЯНИЯ — наработка стартера
  # ═══════════════════════════════════════════════════════════════

  40069:
    role: START_ATTEMPTS_TOTAL
    domain: ENGINE
    group: STATE
    unit: ~
    kind: analog
    description: >
      Общее число попыток запуска с момента изготовления ГУ (счётчик панели).
      Скачок > +1 за один пуск = стартер крутил несколько раз (START_FAILURE);
      темп роста = износ стартера/АКБ.
    _source: CONTROLLER
