<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}cg-analytics{% endblock %}</title>
    <link href="/static/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-size: 0.9rem; }
        .navbar-brand { font-weight: 700; letter-spacing: 0.05em; }
        .status-ok       { color: #198754; font-weight: 600; }
        .status-attention{ color: #fd7e14; font-weight: 600; }
        .status-critical { color: #dc3545; font-weight: 600; }
        .badge-ok        { background-color: #198754; }
        .badge-attention { background-color: #fd7e14; }
        .badge-critical  { background-color: #dc3545; }
        pre.report { white-space: pre-wrap; font-family: inherit; font-size: 0.9rem; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">⚙ cg-analytics</a>
        <div class="navbar-nav me-auto">
            <a class="nav-link" href="/history">История</a>
            <a class="nav-link" href="/analyze">Анализ</a>
            <a class="nav-link" href="/knowledge">База знаний</a>
            <a class="nav-link" href="/settings">Настройки</a>
            <a class="nav-link" href="/log">Журнал</a>
        </div>
        <span class="navbar-text text-secondary" style="font-size:0.75rem">v{{ app_version() }}</span>
    </div>
</nav>
<div class="container-fluid px-4">
    {% block content %}{% endblock %}
</div>
<script src="/static/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
