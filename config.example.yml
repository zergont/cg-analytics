# ══════════════════════════════════════════════════════════════════════════════
# cg-analytics — конфигурация
# Скопируйте в config.yml и заполните значения.
# config.yml добавлен в .gitignore — не попадает в репозиторий.
# ══════════════════════════════════════════════════════════════════════════════

# ── Базы данных ───────────────────────────────────────────────────────────────
databases:
  # Основная БД телеметрии (TimescaleDB/PostgreSQL)
  source: postgresql://user:pass@192.168.1.10:5432/telemetry
  # Аналитическая БД (отдельный инстанс PostgreSQL + pgvector)
  analytics: postgresql://analytics:pass@localhost:5432/analytics
  # Таймаут запросов к source БД (сек). Увеличьте при catch-up окнах >1 суток через WAN/VPN.
  source_query_timeout: 120

# ── Anthropic API ─────────────────────────────────────────────────────────────
anthropic:
  api_key: sk-ant-api03-...
  # Модель агента. Обновлять при выходе новых версий Sonnet.
  model: claude-sonnet-4-6
  # Максимум вызовов инструментов за один отчёт (защита от зацикливания)
  max_tool_calls: 10
  # Максимум токенов в ответе агента
  max_tokens: 8096
  # HTTP-прокси для доступа к API (если сервер за WireGuard без прямого интернета)
  # Формат: http://user:password@host:port
  # proxy: http://analytics:password@31.59.170.218:58889

# ── Расписание суточных отчётов ───────────────────────────────────────────────
# Время в UTC. По умолчанию 21:05 UTC = 00:05 МСК (UTC+3).
# Измените если сервер в другом часовом поясе.
schedule:
  hour: 21
  minute: 5

# ── Эмбеддинги для RAG ────────────────────────────────────────────────────────
embeddings:
  # Ollama (по умолчанию): http://localhost:11434
  # LMStudio:              http://localhost:1234
  base_url: http://localhost:11434
  # Модель должна быть загружена: ollama pull nomic-embed-text
  model: nomic-embed-text
  # Размерность векторов: nomic-embed-text = 768
  dim: 768

# ── Knowledge Base ────────────────────────────────────────────────────────────
knowledge_base:
  # Путь к папке knowledge_base/ (абсолютный или от рабочей директории)
  path: ./knowledge_base

# ── Web UI ────────────────────────────────────────────────────────────────────
web:
  host: 0.0.0.0
  port: 8090

# ── Логирование ───────────────────────────────────────────────────────────────
# Уровни: DEBUG, INFO, WARNING, ERROR
logging:
  level: INFO
